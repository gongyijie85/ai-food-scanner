<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器原生 TTS Demo</title>
    <style>
        /* 页面整体：大字号、高对比，适老化 */
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            font-size: 20px;
            line-height: 1.6;
            max-width: 720px;
            margin: 24px auto;
            padding: 0 16px;
            color: #212121;
            background: #FFFFFF;
        }
        h1 {
            font-size: 28px;
            color: #2E7D32;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
        }
        textarea {
            width: 100%;
            font-size: 20px;
            padding: 16px;
            border: 2px solid #2E7D32;
            border-radius: 12px;
            box-sizing: border-box;
            min-height: 140px;
            resize: vertical;
        }
        .btn-row {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 140px;
            font-size: 20px;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .speak-btn {
            background: #2E7D32;
            color: white;
        }
        .stop-btn {
            background: #FFFFFF;
            color: #2E7D32;
            border: 2px solid #2E7D32;
        }
        .info {
            margin-top: 24px;
            padding: 16px;
            background: #F5F5F5;
            border-radius: 12px;
            font-size: 16px;
        }
        .voice-name {
            font-weight: bold;
            color: #2E7D32;
        }
    </style>
</head>
<body>
    <h1>浏览器原生语音播报 Demo</h1>
    <p class="desc">这是当前 ai-food-scanner 项目使用的方案，依赖浏览器内置语音。</p>

    <textarea id="ttsText">
评分 88 分。按当前档案暂未发现高风险配料。本工具仅供参考，不构成医疗建议。如有健康问题请咨询医生。
    </textarea>

    <div class="btn-row">
        <button class="speak-btn" onclick="speak()">朗读</button>
        <button class="stop-btn" onclick="stop()">停止</button>
    </div>

    <div class="info">
        <p>当前浏览器可用中文语音数：<span id="voiceCount">检测中...</span></p>
        <p>优先音色：<span class="voice-name" id="voiceName">未选择</span></p>
        <p>提示：iOS / 微信内置浏览器可能需要在页面任意位置点击一次后，语音才能正常播放。</p>
    </div>

    <script>
        // 选择最佳中文语音：优先 Microsoft Xiaoxiao，其次 Yaoyao，最后 zh-CN 兜底
        function pickVoice() {
            const voices = window.speechSynthesis.getVoices();
            const countEl = document.getElementById('voiceCount');
            const nameEl = document.getElementById('voiceName');
            countEl.textContent = voices.length;

            // 候选优先级：Xiaoxiao > Yaoyao > Google 普通话 > zh-CN 任意
            let selected = null;
            selected = voices.find(v => /xiaoxiao|晓晓/i.test(v.name));
            if (!selected) selected = voices.find(v => /yaoyao|瑶瑶/i.test(v.name));
            if (!selected) selected = voices.find(v => v.name.includes('Google 普通话'));
            if (!selected) selected = voices.find(v => v.name.includes('Google 中文'));
            if (!selected) selected = voices.find(v => /^zh-CN|^cmn-CN/i.test(v.lang));

            if (selected) {
                nameEl.textContent = selected.name + ' (' + selected.lang + ')';
            } else {
                nameEl.textContent = '未找到中文语音，将使用浏览器默认语音';
            }
            return selected;
        }

        // 语音列表加载完成后再选择
        function loadVoices() {
            pickVoice();
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
        // 立即尝试一次，部分浏览器初始列表为空
        setTimeout(loadVoices, 200);

        function speak() {
            const text = document.getElementById('ttsText').value.trim();
            if (!text) {
                alert('请输入要朗读的文字');
                return;
            }

            const synth = window.speechSynthesis;
            // 先停止之前的，避免队列堆积
            synth.cancel();
            // 解除 Chrome/Edge 的自动播放挂起
            try { synth.resume(); } catch (e) {}

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.0;  // 语速 1.0x
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            const voice = pickVoice();
            if (voice) utterance.voice = voice;

            synth.speak(utterance);
        }

        function stop() {
            window.speechSynthesis.cancel();
        }
    </script>
</body>
</html>
