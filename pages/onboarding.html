    <style id="theme-vars">
/* ============================================
   AI食品配料表智能识别工具 — Brand CSS
   适老化移动端设计系统
   ============================================ */

:root {
  /* ── 色彩系统 ── */
  --color-primary: #2E7D32;
  --color-primary-light: #E8F5E9;
  --color-primary-dark: #1B5E20;
  --color-secondary: #FF9800;
  --color-secondary-light: #FFF3E0;

  /* 状态色 */
  --state-success: #43A047;
  --state-warning: #FDD835;
  --state-error: #E53935;
  --state-info: #1E88E5;

  /* 背景色 */
  --color-bg: #FAFAF5;
  --color-bg-card: #FFFFFF;
  --color-bg-elevated: #FFFFFF;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* 文字色 */
  --color-text-primary: #212121;
  --color-text-secondary: #616161;
  --color-text-tertiary: #9E9E9E;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #2E7D32;

  /* 边框色 */
  --color-border: #E0E0E0;
  --color-border-light: #F0F0F0;
  --color-divider: #EEEEEE;

  /* ── 字体系统 ── */
  --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", sans-serif;

  /* 字号 */
  --font-size-display: 48px;
  --font-size-h1: 28px;
  --font-size-h2: 22px;
  --font-size-h3: 18px;
  --font-size-body-lg: 18px;
  --font-size-body: 16px;
  --font-size-body-sm: 14px;
  --font-size-caption: 12px;

  /* 字重 */
  --font-weight-bold: 700;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* 行高 */
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── 间距系统 ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ── 圆角系统 ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── 阴影系统 ── */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-button: 0 4px 12px rgba(46, 125, 50, 0.3);
  --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.05);

  /* ── 动效 ── */
  --transition-fast: 100ms ease-out;
  --transition-normal: 200ms ease-out;
  --transition-page: 300ms ease-out;
  --transition-score: 500ms ease-out;

  /* ── 布局 ── */
  --page-padding: 20px;
  --card-padding: 16px;
  --card-gap: 16px;
  --safe-area-bottom: 34px;
  --nav-height: 44px;
  --status-bar-height: 44px;
  --tab-bar-height: 83px;
  --min-touch-target: 48px;
  --min-list-item-height: 56px;
}

/* ── 适老模式（大字） ── */
:root[data-mode="large"] {
  --font-size-display: 56px;
  --font-size-h1: 32px;
  --font-size-h2: 26px;
  --font-size-h3: 22px;
  --font-size-body-lg: 22px;
  --font-size-body: 20px;
  --font-size-body-sm: 16px;
  --font-size-caption: 14px;
}

/* ── 超大字模式 ── */
:root[data-mode="extra-large"] {
  --font-size-display: 64px;
  --font-size-h1: 36px;
  --font-size-h2: 28px;
  --font-size-h3: 24px;
  --font-size-body-lg: 24px;
  --font-size-body: 22px;
  --font-size-body-sm: 18px;
  --font-size-caption: 16px;
}

    </style>

        <!-- 轮播交互脚本 -->
        <script>
            (function () {
                const track = document.getElementById('track');
                const dots = document.querySelectorAll('.dot');
                const btnStart = document.getElementById('btnStart');
                const swipeHint = document.getElementById('swipeHint');
                const tagGrid = document.getElementById('tagGrid');
                const carousel = document.getElementById('carousel');

                let current = 0;
                const total = 3;
                let startX = 0;
                let isDragging = false;

                function goTo(index) {
                    if (index < 0) index = 0;
                    if (index >= total) index = total - 1;
                    current = index;
                    track.style.transform = 'translateX(-' + (current * 100) + '%)';

                    // 更新进度点
                    dots.forEach(function (d, i) {
                        d.classList.toggle('active', i === current);
                    });

                    // 最后一屏显示按钮
                    btnStart.style.display = current === total - 1 ? 'flex' : 'none';
                    swipeHint.style.display = current === total - 1 ? 'none' : 'block';
                }

                // 触摸滑动
                carousel.addEventListener('touchstart', function (e) {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                }, { passive: true });

                carousel.addEventListener('touchend', function (e) {
                    if (!isDragging) return;
                    isDragging = false;
                    var endX = e.changedTouches[0].clientX;
                    var diff = startX - endX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) goTo(current + 1);
                        else goTo(current - 1);
                    }
                }, { passive: true });

                // 鼠标拖拽（桌面调试）
                carousel.addEventListener('mousedown', function (e) {
                    startX = e.clientX;
                    isDragging = true;
                    e.preventDefault();
                });

                document.addEventListener('mouseup', function (e) {
                    if (!isDragging) return;
                    isDragging = false;
                    var diff = startX - e.clientX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) goTo(current + 1);
                        else goTo(current - 1);
                    }
                });

                // 点击进度点跳转
                dots.forEach(function (dot, i) {
                    dot.addEventListener('click', function () { goTo(i); });
                    dot.style.cursor = 'pointer';
                });

                // 标签选择切换
                tagGrid.addEventListener('click', function (e) {
                    var tag = e.target.closest('.tag');
                    if (tag) tag.classList.toggle('selected');
                });

                // 开始使用按钮
                btnStart.addEventListener('click', function () {
                    window.location.href = 'home.html';
                });

                // 初始化
                goTo(0);
            })();
        </script>

    <style>
        /* ── 品牌基础 ── */
        body {
            font-family: var(--font-family-cn);
            background: var(--color-bg);
            color: var(--color-text-primary);
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 移动端容器 ── */
        .mobile-shell {
            max-width: 375px;
            height: 812px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--color-bg);
        }

        /* ── 轮播容器 ── */
        .carousel {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--page-padding);
            box-sizing: border-box;
        }

        /* ── 插图区域 (60%) ── */
        .slide-illustration {
            width: 100%;
            flex: 0 0 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .illustration-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .illustration-circle::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px dashed var(--color-border);
            animation: spin-slow 20s linear infinite;
        }

        @keyframes spin-slow {
            to { transform: rotate(360deg); }
        }

        /* 插图 SVG 图标 */
        .illust-icon {
            width: 100px;
            height: 100px;
        }

        /* 装饰元素 */
        .deco-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.5;
        }

        /* ── 文字区域 (30%) ── */
        .slide-text {
            flex: 0 0 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: var(--spacing-md);
            padding: 0 var(--spacing-xl);
        }

        .slide-title {
            font-size: var(--font-size-h1);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            line-height: var(--line-height-tight);
        }

        .slide-desc {
            font-size: var(--font-size-body-lg);
            color: var(--color-text-secondary);
            line-height: var(--line-height-relaxed);
            max-width: 280px;
        }

        /* ── 底部控制区 (10%) ── */
        .slide-controls {
            flex: 0 0 auto;
            padding: var(--spacing-lg) var(--page-padding) var(--spacing-3xl);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-lg);
        }

        /* ── 进度点 ── */
        .dots {
            display: flex;
            gap: var(--spacing-sm);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--color-border);
            transition: all var(--transition-normal);
        }

        .dot.active {
            width: 28px;
            border-radius: 5px;
            background: var(--color-primary);
        }

        /* ── 主按钮 ── */
        .btn-start {
            width: 100%;
            max-width: 320px;
            height: var(--min-touch-target);
            min-height: 56px;
            border-radius: var(--radius-xl);
            border: none;
            background: var(--color-primary);
            color: var(--color-text-inverse);
            font-size: var(--font-size-h2);
            font-weight: var(--font-weight-bold);
            font-family: var(--font-family-cn);
            cursor: pointer;
            box-shadow: var(--shadow-button);
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .btn-start:active {
            transform: scale(0.97);
            background: var(--color-primary-dark);
        }

        /* ── 跳过链接 ── */
        .btn-skip {
            font-size: var(--font-size-body-lg);
            color: var(--color-text-tertiary);
            text-decoration: none;
            min-height: var(--min-touch-target);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: var(--spacing-sm) var(--spacing-base);
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast);
        }

        .btn-skip:active {
            color: var(--color-text-secondary);
        }

        /* ── 慢病选择标签 ── */
        .tag-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            justify-content: center;
            max-width: 300px;
        }

        .tag {
            padding: var(--spacing-sm) var(--spacing-base);
            border-radius: var(--radius-full);
            border: 2px solid var(--color-border);
            font-size: var(--font-size-body);
            color: var(--color-text-secondary);
            background: var(--color-bg-card);
            cursor: pointer;
            transition: all var(--transition-fast);
            min-height: var(--min-touch-target);
            display: flex;
            align-items: center;
            user-select: none;
        }

        .tag.selected {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
        }

        .tag:active {
            transform: scale(0.95);
        }

        /* ── 滑动提示 ── */
        .swipe-hint {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: var(--font-size-caption);
            color: var(--color-text-tertiary);
            animation: fade-pulse 2s ease-in-out infinite;
        }

        @keyframes fade-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* ── 跳过按钮固定位置 ── */
        .skip-fixed {
            position: absolute;
            top: var(--spacing-lg);
            right: var(--page-padding);
            z-index: 10;
        }

        /* ── 无障碍焦点 ── */
        :focus-visible {
            outline: 3px solid var(--color-secondary);
            outline-offset: 2px;
        }
    </style>
</body>
