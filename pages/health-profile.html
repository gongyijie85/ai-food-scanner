<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康档案</title>
    <style id="theme-vars">
/* ============================================
   AI食品配料表智能识别工具 — Brand CSS
   适老化移动端设计系统
   ============================================ */

:root {
  /* ── 色彩系统 ── */
  --color-primary: #2E7D32;
  --color-primary-light: #E8F5E9;
  --color-primary-dark: #1B5E20;
  --color-secondary: #FF9800;
  --color-secondary-light: #FFF3E0;

  /* 状态色 */
  --state-success: #43A047;
  --state-warning: #FDD835;
  --state-error: #E53935;
  --state-info: #1E88E5;

  /* 背景色 */
  --color-bg: #FAFAF5;
  --color-bg-card: #FFFFFF;
  --color-bg-elevated: #FFFFFF;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* 文字色 */
  --color-text-primary: #212121;
  --color-text-secondary: #616161;
  --color-text-tertiary: #9E9E9E;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #2E7D32;

  /* 边框色 */
  --color-border: #E0E0E0;
  --color-border-light: #F0F0F0;
  --color-divider: #EEEEEE;

  /* ── 字体系统 ── */
  --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", sans-serif;

  /* 字号 */
  --font-size-display: 48px;
  --font-size-h1: 28px;
  --font-size-h2: 22px;
  --font-size-h3: 18px;
  --font-size-body-lg: 18px;
  --font-size-body: 16px;
  --font-size-body-sm: 14px;
  --font-size-caption: 12px;

  /* 字重 */
  --font-weight-bold: 700;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* 行高 */
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── 间距系统 ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ── 圆角系统 ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── 阴影系统 ── */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-button: 0 4px 12px rgba(46, 125, 50, 0.3);
  --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.05);

  /* ── 动效 ── */
  --transition-fast: 100ms ease-out;
  --transition-normal: 200ms ease-out;
  --transition-page: 300ms ease-out;
  --transition-score: 500ms ease-out;

  /* ── 布局 ── */
  --page-padding: 20px;
  --card-padding: 16px;
  --card-gap: 16px;
  --safe-area-bottom: 34px;
  --nav-height: 44px;
  --status-bar-height: 44px;
  --tab-bar-height: 83px;
  --min-touch-target: 48px;
  --min-list-item-height: 56px;
}

/* ── 适老模式（大字） ── */
:root[data-mode="large"] {
  --font-size-display: 56px;
  --font-size-h1: 32px;
  --font-size-h2: 26px;
  --font-size-h3: 22px;
  --font-size-body-lg: 22px;
  --font-size-body: 20px;
  --font-size-body-sm: 16px;
  --font-size-caption: 14px;
}

/* ── 超大字模式 ── */
:root[data-mode="extra-large"] {
  --font-size-display: 64px;
  --font-size-h1: 36px;
  --font-size-h2: 28px;
  --font-size-h3: 24px;
  --font-size-body-lg: 24px;
  --font-size-body: 22px;
  --font-size-body-sm: 18px;
  --font-size-caption: 16px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-secondary: var(--color-secondary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background: var(--color-bg); max-width: 375px; margin: 0 auto; padding-bottom: calc(var(--safe-area-bottom) + 80px);">

      <!-- 导航栏 -->
      <nav class="flex items-center justify-between px-4 sticky top-0 z-10" style="height: var(--nav-height); background: var(--color-bg-card); box-shadow: var(--shadow-subtle);">
        <button data-dom-id="btn-back-health" class="flex items-center gap-1 p-2 rounded-lg active:opacity-70" style="min-width: var(--min-touch-target); min-height: var(--min-touch-target);">
          <i data-lucide="chevron-left" style="width: 28px; height: 28px; color: var(--color-text-primary);"></i>
          <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">返回</span>
        </button>
        <h1 style="font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); color: var(--color-text-primary);">健康档案</h1>
        <div style="width: var(--min-touch-target);"></div>
      </nav>

      <!-- 健康状况选择区 -->
      <section class="px-5 mt-6">
        <h2 style="font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); color: var(--color-text-primary);">我的健康状况</h2>
        <p class="mt-1" style="font-size: var(--font-size-body-sm); color: var(--color-text-secondary);">可多选，帮助我们提供更准确的建议</p>

        <div class="grid grid-cols-2 gap-3 mt-4">
          <!-- 糖尿病 - 选中状态 -->
          <button class="condition-tag selected flex flex-col items-center justify-center gap-2 rounded-xl transition-all duration-200 active:scale-95"
                  style="min-height: 120px; background: var(--color-primary-light); border: 2px solid var(--color-primary); box-shadow: var(--shadow-card);"
                  data-condition="diabetes">
            <div class="flex items-center justify-center rounded-full" style="width: 48px; height: 48px; background: var(--color-primary);">
              <i data-lucide="droplets" style="width: 26px; height: 26px; color: #fff;"></i>
            </div>
            <span style="font-size: var(--font-size-body-lg); font-weight: var(--font-weight-medium); color: var(--color-primary);">糖尿病</span>
          </button>

          <!-- 高血压 - 选中状态 -->
          <button class="condition-tag selected flex flex-col items-center justify-center gap-2 rounded-xl transition-all duration-200 active:scale-95"
                  style="min-height: 120px; background: var(--color-primary-light); border: 2px solid var(--color-primary); box-shadow: var(--shadow-card);"
                  data-condition="hypertension">
            <div class="flex items-center justify-center rounded-full" style="width: 48px; height: 48px; background: var(--color-primary);">
              <i data-lucide="heart-pulse" style="width: 26px; height: 26px; color: #fff;"></i>
            </div>
            <span style="font-size: var(--font-size-body-lg); font-weight: var(--font-weight-medium); color: var(--color-primary);">高血压</span>
          </button>

          <!-- 减脂 - 未选中 -->
          <button class="condition-tag flex flex-col items-center justify-center gap-2 rounded-xl transition-all duration-200 active:scale-95"
                  style="min-height: 120px; background: var(--color-bg-card); border: 2px solid var(--color-border-light); box-shadow: var(--shadow-card);"
                  data-condition="fat-loss">
            <div class="flex items-center justify-center rounded-full" style="width: 48px; height: 48px; background: var(--color-border);">
              <i data-lucide="dumbbell" style="width: 26px; height: 26px; color: var(--color-text-secondary);"></i>
            </div>
            <span style="font-size: var(--font-size-body-lg); font-weight: var(--font-weight-medium); color: var(--color-text-primary);">减脂</span>
          </button>

          <!-- 过敏 - 选中状态 -->
          <button class="condition-tag selected flex flex-col items-center justify-center gap-2 rounded-xl transition-all duration-200 active:scale-95"
                  style="min-height: 120px; background: var(--color-primary-light); border: 2px solid var(--color-primary); box-shadow: var(--shadow-card);"
                  data-condition="allergy">
            <div class="flex items-center justify-center rounded-full" style="width: 48px; height: 48px; background: var(--color-primary);">
              <i data-lucide="shield-alert" style="width: 26px; height: 26px; color: #fff;"></i>
            </div>
            <span style="font-size: var(--font-size-body-lg); font-weight: var(--font-weight-medium); color: var(--color-primary);">过敏</span>
          </button>

          <!-- 儿童 - 未选中 -->
          <button class="condition-tag flex flex-col items-center justify-center gap-2 rounded-xl transition-all duration-200 active:scale-95"
                  style="min-height: 120px; background: var(--color-bg-card); border: 2px solid var(--color-border-light); box-shadow: var(--shadow-card);"
                  data-condition="children">
            <div class="flex items-center justify-center rounded-full" style="width: 48px; height: 48px; background: var(--color-border);">
              <i data-lucide="baby" style="width: 26px; height: 26px; color: var(--color-text-secondary);"></i>
            </div>
            <span style="font-size: var(--font-size-body-lg); font-weight: var(--font-weight-medium); color: var(--color-text-primary);">儿童</span>
          </button>

          <!-- 孕妇 - 未选中 -->
          <button class="condition-tag flex flex-col items-center justify-center gap-2 rounded-xl transition-all duration-200 active:scale-95"
                  style="min-height: 120px; background: var(--color-bg-card); border: 2px solid var(--color-border-light); box-shadow: var(--shadow-card);"
                  data-condition="pregnant">
            <div class="flex items-center justify-center rounded-full" style="width: 48px; height: 48px; background: var(--color-border);">
              <i data-lucide="heart-handshake" style="width: 26px; height: 26px; color: var(--color-text-secondary);"></i>
            </div>
            <span style="font-size: var(--font-size-body-lg); font-weight: var(--font-weight-medium); color: var(--color-text-primary);">孕妇</span>
          </button>
        </div>
      </section>

      <!-- 过敏原勾选区 -->
      <section class="px-5 mt-8">
        <h2 style="font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); color: var(--color-text-primary);">过敏原</h2>
        <p class="mt-1" style="font-size: var(--font-size-body-sm); color: var(--color-text-secondary);">如有过敏请勾选</p>

        <div class="mt-4 rounded-xl p-4" style="background: var(--color-bg-card); box-shadow: var(--shadow-card);">
          <div class="grid grid-cols-2 gap-x-4 gap-y-0">
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="peanut">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">花生</span>
            </label>
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="milk">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">牛奶</span>
            </label>
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="egg">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">鸡蛋</span>
            </label>
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="fish">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">鱼类</span>
            </label>
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="shellfish">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">甲壳类</span>
            </label>
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="soy">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">大豆</span>
            </label>
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="nuts">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">坚果</span>
            </label>
            <label class="allergen-item flex items-center gap-3 py-3 cursor-pointer" style="min-height: var(--min-touch-target);">
              <input type="checkbox" class="hidden" value="wheat">
              <div class="allergen-check flex items-center justify-center rounded-md transition-all duration-200" style="width: 24px; height: 24px; border: 2px solid var(--color-border); flex-shrink: 0;"></div>
              <span style="font-size: var(--font-size-body-lg); color: var(--color-text-primary);">小麦</span>
            </label>
          </div>
        </div>
      </section>

      <!-- 用药情况 -->
      <section class="px-5 mt-8">
        <h2 style="font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); color: var(--color-text-primary);">用药情况</h2>
        <p class="mt-1" style="font-size: var(--font-size-body-sm); color: var(--color-text-secondary);">选填，用于配料交互提醒</p>

        <div class="mt-4 rounded-xl p-4" style="background: var(--color-bg-card); box-shadow: var(--shadow-card);">
          <textarea
            placeholder="例如：二甲双胍、阿司匹林..."
            class="w-full resize-none outline-none"
            style="font-size: var(--font-size-body-lg); color: var(--color-text-primary); line-height: var(--line-height-relaxed); min-height: 100px; background: transparent;"
          ></textarea>
        </div>
      </section>

      <!-- 保存按钮 -->
      <div class="px-5 mt-8">
        <button data-dom-id="btn-save"
                class="w-full flex items-center justify-center rounded-xl transition-all duration-200 active:scale-98"
                style="height: 56px; background: var(--color-primary); box-shadow: var(--shadow-button);">
          <span style="font-size: var(--font-size-h3); font-weight: var(--font-weight-bold); color: var(--color-text-inverse); letter-spacing: 0.05em;">保存设置</span>
        </button>
      </div>

    </main>

    <!-- 页面交互脚本 -->
    <script>
      // 健康状况标签切换
      document.querySelectorAll('.condition-tag').forEach(tag => {
        tag.addEventListener('click', () => {
          const isSelected = tag.classList.toggle('selected');
          if (isSelected) {
            tag.style.background = 'var(--color-primary-light)';
            tag.style.borderColor = 'var(--color-primary)';
            tag.querySelector('span').style.color = 'var(--color-primary)';
            tag.querySelector('div').style.background = 'var(--color-primary)';
            tag.querySelector('i').style.color = '#fff';
          } else {
            tag.style.background = 'var(--color-bg-card)';
            tag.style.borderColor = 'var(--color-border-light)';
            tag.querySelector('span').style.color = 'var(--color-text-primary)';
            tag.querySelector('div').style.background = 'var(--color-border)';
            tag.querySelector('i').style.color = 'var(--color-text-secondary)';
          }
        });
      });

      // 过敏原复选框切换
      document.querySelectorAll('.allergen-item').forEach(item => {
        item.addEventListener('click', () => {
          const cb = item.querySelector('input[type="checkbox"]');
          const box = item.querySelector('.allergen-check');
          cb.checked = !cb.checked;
          if (cb.checked) {
            box.style.background = 'var(--color-primary)';
            box.style.borderColor = 'var(--color-primary)';
            box.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
          } else {
            box.style.background = 'transparent';
            box.style.borderColor = 'var(--color-border)';
            box.innerHTML = '';
          }
        });
      });
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
