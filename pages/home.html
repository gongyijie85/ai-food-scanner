<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style id="theme-vars">
/* ============================================
   AI食品配料表智能识别工具 — Brand CSS
   适老化移动端设计系统
   ============================================ */

:root {
  /* ── 色彩系统 ── */
  --color-primary: #2E7D32;
  --color-primary-light: #E8F5E9;
  --color-primary-dark: #1B5E20;
  --color-secondary: #FF9800;
  --color-secondary-light: #FFF3E0;

  /* 状态色 */
  --state-success: #43A047;
  --state-warning: #FDD835;
  --state-error: #E53935;
  --state-info: #1E88E5;

  /* 背景色 */
  --color-bg: #FAFAF5;
  --color-bg-card: #FFFFFF;
  --color-bg-elevated: #FFFFFF;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* 文字色 */
  --color-text-primary: #212121;
  --color-text-secondary: #616161;
  --color-text-tertiary: #9E9E9E;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #2E7D32;

  /* 边框色 */
  --color-border: #E0E0E0;
  --color-border-light: #F0F0F0;
  --color-divider: #EEEEEE;

  /* ── 字体系统 ── */
  --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", sans-serif;

  /* 字号 */
  --font-size-display: 48px;
  --font-size-h1: 28px;
  --font-size-h2: 22px;
  --font-size-h3: 18px;
  --font-size-body-lg: 18px;
  --font-size-body: 16px;
  --font-size-body-sm: 14px;
  --font-size-caption: 12px;

  /* 字重 */
  --font-weight-bold: 700;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* 行高 */
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── 间距系统 ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ── 圆角系统 ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── 阴影系统 ── */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-button: 0 4px 12px rgba(46, 125, 50, 0.3);
  --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.05);

  /* ── 动效 ── */
  --transition-fast: 100ms ease-out;
  --transition-normal: 200ms ease-out;
  --transition-page: 300ms ease-out;
  --transition-score: 500ms ease-out;

  /* ── 布局 ── */
  --page-padding: 20px;
  --card-padding: 16px;
  --card-gap: 16px;
  --safe-area-bottom: 34px;
  --nav-height: 44px;
  --status-bar-height: 44px;
  --tab-bar-height: 83px;
  --min-touch-target: 48px;
  --min-list-item-height: 56px;
}

/* ── 适老模式（大字） ── */
:root[data-mode="large"] {
  --font-size-display: 56px;
  --font-size-h1: 32px;
  --font-size-h2: 26px;
  --font-size-h3: 22px;
  --font-size-body-lg: 22px;
  --font-size-body: 20px;
  --font-size-body-sm: 16px;
  --font-size-caption: 14px;
}

/* ── 超大字模式 ── */
:root[data-mode="extra-large"] {
  --font-size-display: 64px;
  --font-size-h1: 36px;
  --font-size-h2: 28px;
  --font-size-h3: 24px;
  --font-size-body-lg: 24px;
  --font-size-body: 22px;
  --font-size-body-sm: 18px;
  --font-size-caption: 16px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-secondary: var(--color-secondary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <main>
        <!-- 顶部导航栏 -->
        <header class="top-bar">
            <h1 class="top-bar-title">食品配料表识别</h1>
            <button class="top-bar-icon" data-dom-id="link-health-profile" aria-label="健康档案">
                <span class="material-icons">favorite</span>
            </button>
        </header>

        <!-- 健康标签行 -->
        <div class="health-tags-row" data-dom-id="link-health-profile">
            <button class="health-tag">
                <span class="material-icons">local_hospital</span>
                糖尿病
            </button>
            <button class="health-tag">
                <span class="material-icons">monitor_heart</span>
                高血压
            </button>
            <button class="health-tag">
                <span class="material-icons">add</span>
                添加
            </button>
        </div>

        <!-- 扫描按钮区域 -->
        <section class="scan-area">
            <!-- 首次使用提示 -->
            <div class="hint-bubble" id="hintBubble">
                点击大按钮开始
            </div>

            <!-- 大圆形扫描按钮 -->
            <button class="scan-button" data-dom-id="btn-scan" aria-label="扫描配料表">
                <span class="material-icons">photo_camera</span>
                <span class="scan-button-text">扫描配料表</span>
            </button>
        </section>

        <!-- 最近扫描 -->
        <section class="history-section" data-dom-id="link-history">
            <div class="history-heading">
                <h2 class="history-title">最近扫描</h2>
                <button class="history-more" data-dom-id="link-history">查看全部</button>
            </div>
            <div class="history-cards">
                <!-- 卡片1：安全 -->
                <div class="history-card">
                    <div class="history-card-name">伊利纯牛奶</div>
                    <div class="history-card-score score-safe">
                        <span class="material-icons" style="font-size:14px">check_circle</span>
                        安全 92分
                    </div>
                    <div class="history-card-date">2026-06-24</div>
                </div>
                <!-- 卡片2：注意 -->
                <div class="history-card">
                    <div class="history-card-name">奥利奥夹心饼干</div>
                    <div class="history-card-score score-caution">
                        <span class="material-icons" style="font-size:14px">warning</span>
                        注意 58分
                    </div>
                    <div class="history-card-date">2026-06-23</div>
                </div>
                <!-- 卡片3：危险 -->
                <div class="history-card">
                    <div class="history-card-name">某品牌辣条</div>
                    <div class="history-card-score score-danger">
                        <span class="material-icons" style="font-size:14px">dangerous</span>
                        警告 23分
                    </div>
                    <div class="history-card-date">2026-06-22</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 首次提示气泡：3秒后自动消失，或点击后消失
        const hintBubble = document.getElementById('hintBubble');
        if (hintBubble) {
            setTimeout(() => {
                hintBubble.style.transition = 'opacity 300ms ease-out';
                hintBubble.style.opacity = '0';
                setTimeout(() => hintBubble.remove(), 300);
            }, 4000);

            hintBubble.addEventListener('click', () => {
                hintBubble.style.transition = 'opacity 200ms ease-out';
                hintBubble.style.opacity = '0';
                setTimeout(() => hintBubble.remove(), 200);
            });
        }
    </script>

    <style>
        /* 页面基础 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; }
        body {
            font-family: var(--font-family-cn);
            background: var(--color-bg);
            color: var(--color-text-primary);
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 顶部导航栏 */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-md) var(--spacing-base);
            padding-top: calc(var(--spacing-md) + env(safe-area-inset-top, 0px));
            height: calc(var(--nav-height) + env(safe-area-inset-top, 0px));
        }
        .top-bar-title {
            font-size: var(--font-size-h2);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
        }
        .top-bar-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            color: var(--color-primary);
            cursor: pointer;
            border: none;
            transition: background var(--transition-fast);
        }
        .top-bar-icon:active { background: #C8E6C9; }
        .top-bar-icon .material-icons { font-size: 28px; }

        /* 健康标签行 */
        .health-tags-row {
            display: flex;
            gap: var(--spacing-sm);
            padding: 0 var(--spacing-base);
            margin-bottom: var(--spacing-lg);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .health-tags-row::-webkit-scrollbar { display: none; }
        .health-tag {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-body-sm);
            font-weight: var(--font-weight-medium);
            background: var(--color-secondary-light);
            color: #E65100;
            cursor: pointer;
            border: none;
            transition: transform var(--transition-fast);
        }
        .health-tag:active { transform: scale(0.96); }
        .health-tag .material-icons { font-size: 18px; }

        /* 扫描按钮区域 - 占屏幕约60% */
        .scan-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-2xl) var(--spacing-base);
            min-height: 420px;
            position: relative;
        }

        /* 首次提示气泡 */
        .hint-bubble {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-secondary);
            color: #FFFFFF;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-body-sm);
            font-weight: var(--font-weight-medium);
            white-space: nowrap;
            box-shadow: var(--shadow-elevated);
            animation: hint-bounce 2s ease-in-out infinite;
        }
        .hint-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--color-secondary);
        }
        @keyframes hint-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }

        /* 大圆形扫描按钮 */
        .scan-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #43A047 0%, #2E7D32 100%);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            box-shadow: var(--shadow-button), 0 0 0 6px rgba(46,125,50,0.1);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            color: #FFFFFF;
            position: relative;
        }
        .scan-button:active {
            transform: scale(0.95);
            box-shadow: var(--shadow-card), 0 0 0 3px rgba(46,125,50,0.15);
        }
        .scan-button .material-icons { font-size: 56px; }
        .scan-button-text {
            font-size: 24px;
            font-weight: var(--font-weight-bold);
            letter-spacing: 2px;
        }

        /* 脉冲动画环 */
        .scan-button::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(46,125,50,0.3);
            animation: pulse-ring 2s ease-out infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* 最近扫描区域 */
        .history-section {
            padding: var(--spacing-lg) var(--spacing-base);
            padding-bottom: calc(var(--spacing-lg) + var(--safe-area-bottom));
        }
        .history-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-base);
        }
        .history-title {
            font-size: var(--font-size-h3);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
        }
        .history-more {
            font-size: var(--font-size-body-sm);
            color: var(--color-text-link);
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
        }

        /* 历史卡片 */
        .history-cards {
            display: flex;
            gap: var(--spacing-md);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: var(--spacing-xs);
        }
        .history-cards::-webkit-scrollbar { display: none; }
        .history-card {
            flex-shrink: 0;
            width: 160px;
            background: var(--color-bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-base);
            cursor: pointer;
            transition: transform var(--transition-fast);
        }
        .history-card:active { transform: scale(0.97); }
        .history-card-name {
            font-size: var(--font-size-body-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-sm);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-card-score {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-body-sm);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-sm);
        }
        .score-safe { background: #E8F5E9; color: #2E7D32; }
        .score-caution { background: #FFF3E0; color: #E65100; }
        .score-danger { background: #FFEBEE; color: #C62828; }
        .history-card-date {
            font-size: var(--font-size-caption);
            color: var(--color-text-tertiary);
        }
    </style>
</body>
</html>
