<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍照识别</title>
    <style id="theme-vars">
/* ============================================
   AI食品配料表智能识别工具 — Brand CSS
   适老化移动端设计系统
   ============================================ */

:root {
  /* ── 色彩系统 ── */
  --color-primary: #2E7D32;
  --color-primary-light: #E8F5E9;
  --color-primary-dark: #1B5E20;
  --color-secondary: #FF9800;
  --color-secondary-light: #FFF3E0;

  /* 状态色 */
  --state-success: #43A047;
  --state-warning: #FDD835;
  --state-error: #E53935;
  --state-info: #1E88E5;

  /* 背景色 */
  --color-bg: #FAFAF5;
  --color-bg-card: #FFFFFF;
  --color-bg-elevated: #FFFFFF;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* 文字色 */
  --color-text-primary: #212121;
  --color-text-secondary: #616161;
  --color-text-tertiary: #9E9E9E;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #2E7D32;

  /* 边框色 */
  --color-border: #E0E0E0;
  --color-border-light: #F0F0F0;
  --color-divider: #EEEEEE;

  /* ── 字体系统 ── */
  --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", sans-serif;

  /* 字号 */
  --font-size-display: 48px;
  --font-size-h1: 28px;
  --font-size-h2: 22px;
  --font-size-h3: 18px;
  --font-size-body-lg: 18px;
  --font-size-body: 16px;
  --font-size-body-sm: 14px;
  --font-size-caption: 12px;

  /* 字重 */
  --font-weight-bold: 700;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* 行高 */
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── 间距系统 ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ── 圆角系统 ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── 阴影系统 ── */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-button: 0 4px 12px rgba(46, 125, 50, 0.3);
  --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.05);

  /* ── 动效 ── */
  --transition-fast: 100ms ease-out;
  --transition-normal: 200ms ease-out;
  --transition-page: 300ms ease-out;
  --transition-score: 500ms ease-out;

  /* ── 布局 ── */
  --page-padding: 20px;
  --card-padding: 16px;
  --card-gap: 16px;
  --safe-area-bottom: 34px;
  --nav-height: 44px;
  --status-bar-height: 44px;
  --tab-bar-height: 83px;
  --min-touch-target: 48px;
  --min-list-item-height: 56px;
}

/* ── 适老模式（大字） ── */
:root[data-mode="large"] {
  --font-size-display: 56px;
  --font-size-h1: 32px;
  --font-size-h2: 26px;
  --font-size-h3: 22px;
  --font-size-body-lg: 22px;
  --font-size-body: 20px;
  --font-size-body-sm: 16px;
  --font-size-caption: 14px;
}

/* ── 超大字模式 ── */
:root[data-mode="extra-large"] {
  --font-size-display: 64px;
  --font-size-h1: 36px;
  --font-size-h2: 28px;
  --font-size-h3: 24px;
  --font-size-body-lg: 24px;
  --font-size-body: 22px;
  --font-size-body-sm: 18px;
  --font-size-caption: 16px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-secondary: var(--color-secondary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
  <main class="relative w-full h-full bg-camera flex flex-col">

    <!-- ===== 顶部工具栏 ===== -->
    <header class="flex items-center justify-between px-5 pt-12 pb-3 relative z-10"
            style="background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);">
      <!-- 返回按钮 -->
      <button data-dom-id="btn-back-camera"
              class="w-12 h-12 flex items-center justify-center rounded-full"
              style="background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);"
              aria-label="返回">
        <span class="material-icons-round text-white" style="font-size: 28px;">arrow_back</span>
      </button>

      <!-- 识别中指示器 -->
      <div class="flex items-center gap-2 px-4 py-2 rounded-full"
           style="background: rgba(67, 160, 71, 0.2); border: 1px solid rgba(67, 160, 71, 0.4);">
        <div class="recognizing-dot"></div>
        <span class="text-white font-medium" style="font-size: 14px;">识别中</span>
      </div>

      <!-- 闪光灯切换 -->
      <button class="w-12 h-12 flex items-center justify-center rounded-full"
              style="background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);"
              aria-label="闪光灯">
        <span class="material-icons-round text-white" style="font-size: 24px;">flash_off</span>
      </button>
    </header>

    <!-- ===== 相机取景区域 ===== -->
    <section class="flex-1 flex flex-col items-center justify-center relative camera-noise">

      <!-- 模拟相机画面中的食品包装示意 -->
      <div class="absolute inset-0 flex items-center justify-center opacity-20">
        <div class="w-48 h-64 rounded-lg border border-white/20 flex items-center justify-center">
          <span class="text-white/40 text-sm">食品包装</span>
        </div>
      </div>

      <!-- 扫描框 -->
      <div class="scan-frame flex items-center justify-center">
        <div class="scan-corner-bl"></div>
        <div class="scan-corner-br"></div>
        <div class="scan-line"></div>
      </div>

      <!-- 语音提示文字 -->
      <div class="mt-6 flex items-center gap-2 px-5 py-3 rounded-2xl"
           style="background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);">
        <span class="material-icons-round text-white" style="font-size: 22px;">volume_up</span>
        <p class="text-white font-medium" style="font-size: 18px; line-height: 1.4;">
          请对准配料表文字
        </p>
      </div>

      <!-- 手抖提示（默认隐藏，可交互触发） -->
      <div id="shakeHint" class="mt-4 flex items-center gap-2 px-4 py-2 rounded-xl hidden shake-hint"
           style="background: rgba(255, 152, 0, 0.25); border: 1px solid rgba(255, 152, 0, 0.4);">
        <span class="material-icons-round" style="font-size: 20px; color: #FF9800;">warning</span>
        <span class="text-white" style="font-size: 14px;">检测到手抖，已自动连拍3张</span>
      </div>
    </section>

    <!-- ===== 识别状态遮罩（默认隐藏） ===== -->
    <div id="recognizingOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 hidden"
         style="background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(16px);">
      <!-- 进度环 -->
      <svg class="progress-ring" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="35"></circle>
        <circle class="ring-fg" cx="40" cy="40" r="35"></circle>
      </svg>

      <!-- 识别文字 -->
      <p class="text-white font-medium mt-6" style="font-size: 20px;">正在识别，请稍候...</p>
      <p class="text-white/50 mt-2" style="font-size: 14px;">AI 正在分析配料表</p>
    </div>

    <!-- ===== 预览确认遮罩（默认隐藏） ===== -->
    <div id="previewOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 hidden"
         style="background: rgba(26, 26, 26, 0.9);">
      <!-- 预览图占位 -->
      <div class="w-64 h-80 rounded-2xl overflow-hidden mb-8" style="border: 2px solid rgba(255,255,255,0.2);">
        <div class="w-full h-full flex items-center justify-center" style="background: rgba(255,255,255,0.05);">
          <span class="material-icons-round text-white/30" style="font-size: 64px;">photo</span>
        </div>
      </div>

      <!-- 确认/重拍按钮 -->
      <div class="flex items-center gap-6">
        <!-- 重拍 -->
        <button class="flex flex-col items-center gap-2"
                aria-label="重拍">
          <div class="w-16 h-16 rounded-full flex items-center justify-center"
               style="background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);">
            <span class="material-icons-round text-white" style="font-size: 28px;">refresh</span>
          </div>
          <span class="text-white" style="font-size: 14px;">重拍</span>
        </button>

        <!-- 确认使用 -->
        <button data-dom-id="btn-capture-complete"
                class="flex flex-col items-center gap-2"
                aria-label="确认使用">
          <div class="w-16 h-16 rounded-full flex items-center justify-center"
               style="background: #43A047; box-shadow: 0 4px 16px rgba(67,160,71,0.4);">
            <span class="material-icons-round text-white" style="font-size: 28px;">check</span>
          </div>
          <span class="text-white" style="font-size: 14px;">使用照片</span>
        </button>
      </div>
    </div>

    <!-- ===== 底部操作栏 ===== -->
    <footer class="flex items-center justify-center gap-10 px-5 pb-10 pt-4 relative z-10"
            style="background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);">
      <!-- 相册按钮 -->
      <button class="album-btn" aria-label="从相册选择">
        <span class="material-icons-round" style="font-size: 26px;">photo_library</span>
      </button>

      <!-- 拍照按钮 -->
      <button class="capture-btn" aria-label="拍照">
        <div class="capture-btn-inner"></div>
      </button>

      <!-- 占位（保持拍照按钮居中） -->
      <div class="w-[52px] h-[52px]"></div>
    </footer>

  </main>

  <script>
    // ── 简易交互演示 ──
    // 点击拍照按钮 → 显示预览确认
    const captureBtn = document.querySelector('.capture-btn');
    const previewOverlay = document.getElementById('previewOverlay');
    const recognizingOverlay = document.getElementById('recognizingOverlay');
    const shakeHint = document.getElementById('shakeHint');

    captureBtn.addEventListener('click', () => {
      // 模拟拍照：先显示识别状态，再显示预览
      recognizingOverlay.classList.remove('hidden');

      setTimeout(() => {
        recognizingOverlay.classList.add('hidden');
        previewOverlay.classList.remove('hidden');
      }, 2000);
    });

    // 预览页的重拍按钮
    previewOverlay.querySelector('button:first-child').addEventListener('click', () => {
      previewOverlay.classList.add('hidden');
    });

    // 确认按钮导航（演示用 alert）
    document.querySelector('[data-dom-id="btn-capture-complete"]').addEventListener('click', () => {
      // 实际项目中导航到 result.html
      // window.location.href = 'result.html';
      previewOverlay.classList.add('hidden');
      recognizingOverlay.classList.remove('hidden');
      setTimeout(() => {
        recognizingOverlay.classList.add('hidden');
      }, 1500);
    });

    // 返回按钮
    document.querySelector('[data-dom-id="btn-back-camera"]').addEventListener('click', () => {
      // 实际项目中导航到 home.html
      // window.location.href = 'home.html';
    });
  </script>

    <style>
    /* ── 相机取景器基础 ── */
    body {
      margin: 0;
      padding: 0;
      background: #1A1A1A;
      font-family: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", sans-serif;
      overflow: hidden;
      width: 375px;
      height: 812px;
      position: relative;
    }

    /* ── 扫描框动画角标 ── */
    .scan-frame {
      position: relative;
      width: 280px;
      height: 180px;
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-corner-bl,
    .scan-corner-br {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #43A047;
      border-style: solid;
      border-width: 0;
    }

    /* 左上角 */
    .scan-frame::before {
      top: 0; left: 0;
      border-top-width: 4px;
      border-left-width: 4px;
      border-top-left-radius: 8px;
    }

    /* 右上角 */
    .scan-frame::after {
      top: 0; right: 0;
      border-top-width: 4px;
      border-right-width: 4px;
      border-top-right-radius: 8px;
    }

    /* 左下角 */
    .scan-corner-bl {
      bottom: 0; left: 0;
      border-bottom-width: 4px;
      border-left-width: 4px;
      border-bottom-left-radius: 8px;
    }

    /* 右下角 */
    .scan-corner-br {
      bottom: 0; right: 0;
      border-bottom-width: 4px;
      border-right-width: 4px;
      border-bottom-right-radius: 8px;
    }

    /* 角标呼吸动画 */
    .scan-frame::before,
    .scan-frame::after,
    .scan-corner-bl,
    .scan-corner-br {
      animation: corner-pulse 2s ease-in-out infinite;
    }

    @keyframes corner-pulse {
      0%, 100% { border-color: #43A047; }
      50% { border-color: #66BB6A; }
    }

    /* 扫描线动画 */
    .scan-line {
      position: absolute;
      top: 0;
      left: 8px;
      right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #43A047, transparent);
      animation: scan-sweep 2.5s ease-in-out infinite;
    }

    @keyframes scan-sweep {
      0% { top: 8px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: calc(100% - 10px); opacity: 0; }
    }

    /* ── 拍照按钮 ── */
    .capture-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid #FFFFFF;
      background: transparent;
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 150ms ease-out;
    }

    .capture-btn:active {
      transform: scale(0.92);
    }

    .capture-btn-inner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #43A047;
      transition: background 150ms ease-out;
    }

    .capture-btn:active .capture-btn-inner {
      background: #2E7D32;
    }

    /* ── 相册按钮 ── */
    .album-btn {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      transition: background 150ms ease-out;
    }

    .album-btn:active {
      background: rgba(255, 255, 255, 0.25);
    }

    /* ── 识别进度环 ── */
    .progress-ring {
      width: 80px;
      height: 80px;
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
    }

    .progress-ring .ring-bg {
      stroke: rgba(255, 255, 255, 0.15);
    }

    .progress-ring .ring-fg {
      stroke: #43A047;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      transform: rotate(-90deg);
      transform-origin: center;
      animation: ring-fill 2s ease-in-out infinite;
    }

    @keyframes ring-fill {
      0% { stroke-dashoffset: 220; }
      50% { stroke-dashoffset: 110; }
      100% { stroke-dashoffset: 220; }
    }

    /* ── 识别中指示器 ── */
    .recognizing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #43A047;
      animation: dot-blink 1.2s ease-in-out infinite;
    }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── 手抖提示 ── */
    .shake-hint {
      animation: gentle-shake 0.4s ease-in-out;
    }

    @keyframes gentle-shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    /* ── 模拟相机噪点纹理 ── */
    .camera-noise {
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(40, 40, 40, 0.4) 0%, transparent 70%),
        radial-gradient(ellipse at 80% 30%, rgba(30, 30, 30, 0.3) 0%, transparent 60%);
    }
  </style>
</body>
</html>
