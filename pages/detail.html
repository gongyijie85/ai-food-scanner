<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品详情</title>
    <style id="theme-vars">
/* ============================================
   AI食品配料表智能识别工具 — Brand CSS
   适老化移动端设计系统
   ============================================ */

:root {
  /* ── 色彩系统 ── */
  --color-primary: #2E7D32;
  --color-primary-light: #E8F5E9;
  --color-primary-dark: #1B5E20;
  --color-secondary: #FF9800;
  --color-secondary-light: #FFF3E0;

  /* 状态色 */
  --state-success: #43A047;
  --state-warning: #FDD835;
  --state-error: #E53935;
  --state-info: #1E88E5;

  /* 背景色 */
  --color-bg: #FAFAF5;
  --color-bg-card: #FFFFFF;
  --color-bg-elevated: #FFFFFF;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* 文字色 */
  --color-text-primary: #212121;
  --color-text-secondary: #616161;
  --color-text-tertiary: #9E9E9E;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #2E7D32;

  /* 边框色 */
  --color-border: #E0E0E0;
  --color-border-light: #F0F0F0;
  --color-divider: #EEEEEE;

  /* ── 字体系统 ── */
  --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", sans-serif;

  /* 字号 */
  --font-size-display: 48px;
  --font-size-h1: 28px;
  --font-size-h2: 22px;
  --font-size-h3: 18px;
  --font-size-body-lg: 18px;
  --font-size-body: 16px;
  --font-size-body-sm: 14px;
  --font-size-caption: 12px;

  /* 字重 */
  --font-weight-bold: 700;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* 行高 */
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── 间距系统 ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ── 圆角系统 ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── 阴影系统 ── */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-button: 0 4px 12px rgba(46, 125, 50, 0.3);
  --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.05);

  /* ── 动效 ── */
  --transition-fast: 100ms ease-out;
  --transition-normal: 200ms ease-out;
  --transition-page: 300ms ease-out;
  --transition-score: 500ms ease-out;

  /* ── 布局 ── */
  --page-padding: 20px;
  --card-padding: 16px;
  --card-gap: 16px;
  --safe-area-bottom: 34px;
  --nav-height: 44px;
  --status-bar-height: 44px;
  --tab-bar-height: 83px;
  --min-touch-target: 48px;
  --min-list-item-height: 56px;
}

/* ── 适老模式（大字） ── */
:root[data-mode="large"] {
  --font-size-display: 56px;
  --font-size-h1: 32px;
  --font-size-h2: 26px;
  --font-size-h3: 22px;
  --font-size-body-lg: 22px;
  --font-size-body: 20px;
  --font-size-body-sm: 16px;
  --font-size-caption: 14px;
}

/* ── 超大字模式 ── */
:root[data-mode="extra-large"] {
  --font-size-display: 64px;
  --font-size-h1: 36px;
  --font-size-h2: 28px;
  --font-size-h3: 24px;
  --font-size-body-lg: 24px;
  --font-size-body: 22px;
  --font-size-body-sm: 18px;
  --font-size-caption: 16px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-secondary: var(--color-secondary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>

<main>

  <!-- 导航栏 -->
  <nav class="nav-bar">
    <button class="nav-bar__back" data-dom-id="btn-back-detail" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <span class="nav-bar__title">产品详情</span>
  </nav>

  <div class="page-content">

    <!-- 评分英雄区 -->
    <section class="score-hero">
      <div class="score-hero__product">某品牌酱油</div>
      <div class="score-hero__number">65</div>
      <div class="score-hero__label">中等风险</div>
      <div class="score-hero__desc">含有3种需关注的添加剂，钠含量较高</div>
    </section>

    <!-- 扫描信息卡片 -->
    <section class="card">
      <h2 class="card__title">扫描信息</h2>
      <div class="scan-meta">
        <div class="scan-meta__image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </div>
        <div class="scan-meta__info">
          <div class="scan-meta__row">
            <span class="scan-meta__label">扫描时间</span>
            <span class="scan-meta__value">2026-06-24 14:30</span>
          </div>
          <div class="scan-meta__row">
            <span class="scan-meta__label">设备型号</span>
            <span class="scan-meta__value">iPhone 16 Pro</span>
          </div>
          <div class="scan-meta__row">
            <span class="scan-meta__label">识别引擎</span>
            <span class="scan-meta__value">AI v2.1</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 添加剂清单卡片 -->
    <section class="card">
      <h2 class="card__title">添加剂清单</h2>

      <div class="additive-item">
        <span class="additive-dot additive-dot--yellow"></span>
        <span class="additive-name">山梨酸钾</span>
        <span class="additive-risk">防腐剂</span>
      </div>

      <div class="additive-item">
        <span class="additive-dot additive-dot--yellow"></span>
        <span class="additive-name">焦糖色</span>
        <span class="additive-risk">着色剂</span>
      </div>

      <div class="additive-item">
        <span class="additive-dot additive-dot--yellow"></span>
        <span class="additive-name">谷氨酸钠</span>
        <span class="additive-risk">增味剂</span>
      </div>

    </section>

    <!-- 营养成分卡片 -->
    <section class="card">
      <h2 class="card__title">营养成分</h2>

      <div class="nutrition-item">
        <div class="nutrition-item__header">
          <span class="nutrition-item__name">钠</span>
          <span class="nutrition-item__value">580mg / 10ml（每日25%）</span>
        </div>
        <div class="nutrition-bar">
          <div class="nutrition-bar__fill nutrition-bar__fill--high" style="width: 25%;"></div>
        </div>
      </div>

      <div class="nutrition-item">
        <div class="nutrition-item__header">
          <span class="nutrition-item__name">糖</span>
          <span class="nutrition-item__value">3g / 10ml（每日6%）</span>
        </div>
        <div class="nutrition-bar">
          <div class="nutrition-bar__fill nutrition-bar__fill--low" style="width: 6%;"></div>
        </div>
      </div>

    </section>

    <!-- 健康建议卡片 -->
    <section class="card">
      <h2 class="card__title">健康建议</h2>
      <div class="advice-text">
        高血压人群建议谨慎食用。该产品钠含量较高（占每日推荐摄入量的25%），长期过量摄入钠可能增加心血管疾病风险。建议选择低钠酱油替代品，每日酱油用量控制在15ml以内。
      </div>
    </section>

  </div>

  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <button class="btn btn--primary" data-dom-id="btn-re-score">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
      重新评分
    </button>
    <button class="btn btn--outline" data-dom-id="btn-share">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
      分享给家人
    </button>
  </div>

</main>


    <style>
    /* ── 页面基础 ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-family-cn);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      line-height: var(--line-height-normal);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 导航栏 ── */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border-light);
      padding: 0 var(--page-padding);
    }
    .nav-bar__title {
      font-size: var(--font-size-h3);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-primary);
    }
    .nav-bar__back {
      position: absolute;
      left: var(--page-padding);
      top: 50%;
      transform: translateY(-50%);
      width: var(--min-touch-target);
      height: var(--min-touch-target);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--color-text-primary);
    }
    .nav-bar__back svg {
      width: 24px;
      height: 24px;
    }

    /* ── 主内容区 ── */
    .page-content {
      padding: var(--spacing-base) var(--page-padding);
      padding-bottom: calc(var(--spacing-3xl) + var(--safe-area-bottom) + 80px);
    }

    /* ── 评分英雄区 ── */
    .score-hero {
      background: linear-gradient(135deg, #FFF8E1 0%, #FFF3E0 100%);
      border-radius: var(--radius-lg);
      padding: var(--spacing-2xl) var(--spacing-xl);
      text-align: center;
      margin-bottom: var(--card-gap);
      box-shadow: var(--shadow-card);
      border: 2px solid #FFE082;
    }
    .score-hero__product {
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-xs);
    }
    .score-hero__number {
      font-family: var(--font-family-num);
      font-size: var(--font-size-display);
      font-weight: var(--font-weight-bold);
      color: #F9A825;
      line-height: 1.1;
      margin: var(--spacing-sm) 0;
    }
    .score-hero__label {
      font-size: var(--font-size-body-lg);
      font-weight: var(--font-weight-medium);
      color: #F57F17;
      margin-bottom: var(--spacing-sm);
    }
    .score-hero__desc {
      font-size: var(--font-size-body);
      color: var(--color-text-secondary);
    }

    /* ── 白色卡片 ── */
    .card {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--card-padding);
      margin-bottom: var(--card-gap);
      box-shadow: var(--shadow-card);
    }
    .card__title {
      font-size: var(--font-size-h3);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-base);
      padding-bottom: var(--spacing-sm);
      border-bottom: 1px solid var(--color-divider);
    }

    /* ── 扫描信息卡片 ── */
    .scan-meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-base);
    }
    .scan-meta__image {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      background: var(--color-border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .scan-meta__image svg {
      width: 32px;
      height: 32px;
      color: var(--color-text-tertiary);
    }
    .scan-meta__info {
      flex: 1;
    }
    .scan-meta__row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-xs);
    }
    .scan-meta__row:last-child { margin-bottom: 0; }
    .scan-meta__label {
      font-size: var(--font-size-body-sm);
      color: var(--color-text-tertiary);
      min-width: 56px;
    }
    .scan-meta__value {
      font-size: var(--font-size-body);
      color: var(--color-text-primary);
      font-weight: var(--font-weight-medium);
    }

    /* ── 添加剂清单 ── */
    .additive-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) 0;
      border-bottom: 1px solid var(--color-divider);
    }
    .additive-item:last-child { border-bottom: none; }
    .additive-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .additive-dot--yellow { background: #FDD835; }
    .additive-dot--red { background: #E53935; }
    .additive-dot--green { background: #43A047; }
    .additive-name {
      font-size: var(--font-size-body-lg);
      color: var(--color-text-primary);
      flex: 1;
    }
    .additive-risk {
      font-size: var(--font-size-body-sm);
      color: var(--color-text-secondary);
      background: #FFF8E1;
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }

    /* ── 营养成分条 ── */
    .nutrition-item {
      margin-bottom: var(--spacing-base);
    }
    .nutrition-item:last-child { margin-bottom: 0; }
    .nutrition-item__header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--spacing-xs);
    }
    .nutrition-item__name {
      font-size: var(--font-size-body);
      color: var(--color-text-primary);
      font-weight: var(--font-weight-medium);
    }
    .nutrition-item__value {
      font-size: var(--font-size-body);
      color: var(--color-text-secondary);
      font-family: var(--font-family-num);
    }
    .nutrition-bar {
      width: 100%;
      height: 8px;
      background: var(--color-border-light);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .nutrition-bar__fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width var(--transition-score);
    }
    .nutrition-bar__fill--high { background: #E53935; }
    .nutrition-bar__fill--medium { background: #FDD835; }
    .nutrition-bar__fill--low { background: #43A047; }

    /* ── 健康建议 ── */
    .advice-text {
      font-size: var(--font-size-body-lg);
      color: var(--color-text-primary);
      line-height: var(--line-height-relaxed);
      padding: var(--spacing-sm) var(--spacing-base);
      background: #FFF8E1;
      border-radius: var(--radius-sm);
      border-left: 4px solid #F9A825;
    }

    /* ── 底部操作栏 ── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--color-bg-card);
      padding: var(--spacing-sm) var(--page-padding);
      padding-bottom: calc(var(--spacing-sm) + var(--safe-area-bottom));
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.08);
      display: flex;
      gap: var(--spacing-base);
    }
    .btn {
      flex: 1;
      height: 52px;
      border-radius: var(--radius-md);
      font-size: var(--font-size-body-lg);
      font-weight: var(--font-weight-bold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      transition: all var(--transition-fast);
      font-family: var(--font-family-cn);
    }
    .btn--primary {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      box-shadow: var(--shadow-button);
    }
    .btn--primary:active {
      background: var(--color-primary-dark);
      transform: scale(0.98);
    }
    .btn--outline {
      background: transparent;
      color: var(--color-secondary);
      border: 2px solid var(--color-secondary);
    }
    .btn--outline:active {
      background: var(--color-secondary-light);
      transform: scale(0.98);
    }
    .btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</body>
</html>
