<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录</title>
    <style id="theme-vars">
/* ============================================
   AI食品配料表智能识别工具 — Brand CSS
   适老化移动端设计系统
   ============================================ */

:root {
  /* ── 色彩系统 ── */
  --color-primary: #2E7D32;
  --color-primary-light: #E8F5E9;
  --color-primary-dark: #1B5E20;
  --color-secondary: #FF9800;
  --color-secondary-light: #FFF3E0;

  /* 状态色 */
  --state-success: #43A047;
  --state-warning: #FDD835;
  --state-error: #E53935;
  --state-info: #1E88E5;

  /* 背景色 */
  --color-bg: #FAFAF5;
  --color-bg-card: #FFFFFF;
  --color-bg-elevated: #FFFFFF;
  --color-bg-overlay: rgba(0, 0, 0, 0.5);

  /* 文字色 */
  --color-text-primary: #212121;
  --color-text-secondary: #616161;
  --color-text-tertiary: #9E9E9E;
  --color-text-inverse: #FFFFFF;
  --color-text-link: #2E7D32;

  /* 边框色 */
  --color-border: #E0E0E0;
  --color-border-light: #F0F0F0;
  --color-divider: #EEEEEE;

  /* ── 字体系统 ── */
  --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", sans-serif;

  /* 字号 */
  --font-size-display: 48px;
  --font-size-h1: 28px;
  --font-size-h2: 22px;
  --font-size-h3: 18px;
  --font-size-body-lg: 18px;
  --font-size-body: 16px;
  --font-size-body-sm: 14px;
  --font-size-caption: 12px;

  /* 字重 */
  --font-weight-bold: 700;
  --font-weight-medium: 500;
  --font-weight-regular: 400;

  /* 行高 */
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* ── 间距系统 ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-base: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ── 圆角系统 ── */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* ── 阴影系统 ── */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-button: 0 4px 12px rgba(46, 125, 50, 0.3);
  --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.05);

  /* ── 动效 ── */
  --transition-fast: 100ms ease-out;
  --transition-normal: 200ms ease-out;
  --transition-page: 300ms ease-out;
  --transition-score: 500ms ease-out;

  /* ── 布局 ── */
  --page-padding: 20px;
  --card-padding: 16px;
  --card-gap: 16px;
  --safe-area-bottom: 34px;
  --nav-height: 44px;
  --status-bar-height: 44px;
  --tab-bar-height: 83px;
  --min-touch-target: 48px;
  --min-list-item-height: 56px;
}

/* ── 适老模式（大字） ── */
:root[data-mode="large"] {
  --font-size-display: 56px;
  --font-size-h1: 32px;
  --font-size-h2: 26px;
  --font-size-h3: 22px;
  --font-size-body-lg: 22px;
  --font-size-body: 20px;
  --font-size-body-sm: 16px;
  --font-size-caption: 14px;
}

/* ── 超大字模式 ── */
:root[data-mode="extra-large"] {
  --font-size-display: 64px;
  --font-size-h1: 36px;
  --font-size-h2: 28px;
  --font-size-h3: 24px;
  --font-size-body-lg: 24px;
  --font-size-body: 22px;
  --font-size-body-sm: 18px;
  --font-size-caption: 16px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-secondary: var(--color-secondary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background: var(--color-bg); font-family: var(--font-family-cn);">

      <!-- 顶部导航栏 -->
      <nav class="flex items-center justify-between px-5 py-3" style="height: var(--nav-height); background: var(--color-bg-card);">
        <button data-dom-id="btn-back-history" class="flex items-center justify-center rounded-full" style="width: 40px; height: 40px; background: var(--color-bg);" aria-label="返回">
          <i data-lucide="chevron-left" style="width: 24px; height: 24px; color: var(--color-text-primary);"></i>
        </button>
        <h1 class="text-lg font-bold" style="font-size: var(--font-size-h2); color: var(--color-text-primary);">历史记录</h1>
        <div style="width: 40px;"></div>
      </nav>

      <!-- 搜索栏 -->
      <div class="px-5 pt-4 pb-2">
        <div class="flex items-center rounded-full px-4" style="height: 48px; background: #F0F0EC;">
          <i data-lucide="search" style="width: 20px; height: 20px; color: var(--color-text-tertiary); flex-shrink: 0;"></i>
          <input type="text" placeholder="搜索产品名称..." class="flex-1 bg-transparent border-none outline-none ml-3" style="font-size: var(--font-size-body-lg); color: var(--color-text-primary); font-family: var(--font-family-cn);" />
          <button class="flex items-center justify-center rounded-full ml-2" style="width: 36px; height: 36px; background: var(--color-primary-light);" aria-label="语音搜索">
            <i data-lucide="mic" style="width: 18px; height: 18px; color: var(--color-primary);"></i>
          </button>
        </div>
        <p class="mt-1 text-center" style="font-size: var(--font-size-caption); color: var(--color-text-tertiary);">支持语音搜索，点击麦克风图标即可</p>
      </div>

      <!-- 筛选标签行 -->
      <div class="flex gap-3 px-5 py-3 overflow-x-auto no-scrollbar">
        <button class="flex-shrink-0 px-5 py-2 rounded-full font-medium" style="font-size: var(--font-size-body); background: var(--color-primary); color: var(--color-text-inverse);">全部</button>
        <button class="flex-shrink-0 px-5 py-2 rounded-full font-medium" style="font-size: var(--font-size-body); background: #E8F5E9; color: #2E7D32;">安全</button>
        <button class="flex-shrink-0 px-5 py-2 rounded-full font-medium" style="font-size: var(--font-size-body); background: #FFF8E1; color: #F57F17;">注意</button>
        <button class="flex-shrink-0 px-5 py-2 rounded-full font-medium" style="font-size: var(--font-size-body); background: #FFEBEE; color: #C62828;">高风险</button>
      </div>

      <!-- 扫描记录列表 -->
      <div class="px-5 pb-6">

        <!-- 记录1: 某品牌酱油 65分(黄) -->
        <div data-dom-id="link-item-detail" class="flex items-center rounded-2xl px-4 mb-3 cursor-pointer" style="min-height: 80px; background: var(--color-bg-card); box-shadow: var(--shadow-card);">
          <div class="flex items-center justify-center flex-shrink-0 rounded-full" style="width: 52px; height: 52px; background: #FFF8E1;">
            <span class="font-bold" style="font-size: 22px; color: #F57F17; font-family: var(--font-family-num);">65</span>
          </div>
          <div class="flex-1 ml-4">
            <p class="font-bold" style="font-size: var(--font-size-body-lg); color: var(--color-text-primary); line-height: 1.3;">某品牌酱油</p>
            <p class="mt-0.5" style="font-size: var(--font-size-body-sm); color: #F57F17; font-weight: var(--font-weight-medium);">需要注意</p>
            <p class="mt-0.5" style="font-size: var(--font-size-caption); color: var(--color-text-tertiary);">2026-06-24</p>
          </div>
          <i data-lucide="chevron-right" style="width: 20px; height: 20px; color: var(--color-text-tertiary); flex-shrink: 0;"></i>
        </div>

        <!-- 记录2: 全麦面包 82分(绿) -->
        <div data-dom-id="link-item-detail" class="flex items-center rounded-2xl px-4 mb-3 cursor-pointer" style="min-height: 80px; background: var(--color-bg-card); box-shadow: var(--shadow-card);">
          <div class="flex items-center justify-center flex-shrink-0 rounded-full" style="width: 52px; height: 52px; background: #E8F5E9;">
            <span class="font-bold" style="font-size: 22px; color: #2E7D32; font-family: var(--font-family-num);">82</span>
          </div>
          <div class="flex-1 ml-4">
            <p class="font-bold" style="font-size: var(--font-size-body-lg); color: var(--color-text-primary); line-height: 1.3;">全麦面包</p>
            <p class="mt-0.5" style="font-size: var(--font-size-body-sm); color: #2E7D32; font-weight: var(--font-weight-medium);">安全</p>
            <p class="mt-0.5" style="font-size: var(--font-size-caption); color: var(--color-text-tertiary);">2026-06-23</p>
          </div>
          <i data-lucide="chevron-right" style="width: 20px; height: 20px; color: var(--color-text-tertiary); flex-shrink: 0;"></i>
        </div>

        <!-- 记录3: 某品牌酸奶 78分(黄) -->
        <div data-dom-id="link-item-detail" class="flex items-center rounded-2xl px-4 mb-3 cursor-pointer" style="min-height: 80px; background: var(--color-bg-card); box-shadow: var(--shadow-card);">
          <div class="flex items-center justify-center flex-shrink-0 rounded-full" style="width: 52px; height: 52px; background: #FFF8E1;">
            <span class="font-bold" style="font-size: 22px; color: #F57F17; font-family: var(--font-family-num);">78</span>
          </div>
          <div class="flex-1 ml-4">
            <p class="font-bold" style="font-size: var(--font-size-body-lg); color: var(--color-text-primary); line-height: 1.3;">某品牌酸奶</p>
            <p class="mt-0.5" style="font-size: var(--font-size-body-sm); color: #F57F17; font-weight: var(--font-weight-medium);">需要注意</p>
            <p class="mt-0.5" style="font-size: var(--font-size-caption); color: var(--color-text-tertiary);">2026-06-22</p>
          </div>
          <i data-lucide="chevron-right" style="width: 20px; height: 20px; color: var(--color-text-tertiary); flex-shrink: 0;"></i>
        </div>

        <!-- 记录4: 纯牛奶 91分(绿) -->
        <div data-dom-id="link-item-detail" class="flex items-center rounded-2xl px-4 mb-3 cursor-pointer" style="min-height: 80px; background: var(--color-bg-card); box-shadow: var(--shadow-card);">
          <div class="flex items-center justify-center flex-shrink-0 rounded-full" style="width: 52px; height: 52px; background: #E8F5E9;">
            <span class="font-bold" style="font-size: 22px; color: #2E7D32; font-family: var(--font-family-num);">91</span>
          </div>
          <div class="flex-1 ml-4">
            <p class="font-bold" style="font-size: var(--font-size-body-lg); color: var(--color-text-primary); line-height: 1.3;">纯牛奶</p>
            <p class="mt-0.5" style="font-size: var(--font-size-body-sm); color: #2E7D32; font-weight: var(--font-weight-medium);">安全</p>
            <p class="mt-0.5" style="font-size: var(--font-size-caption); color: var(--color-text-tertiary);">2026-06-20</p>
          </div>
          <i data-lucide="chevron-right" style="width: 20px; height: 20px; color: var(--color-text-tertiary); flex-shrink: 0;"></i>
        </div>

        <!-- 记录5: 某品牌薯片 35分(红) -->
        <div data-dom-id="link-item-detail" class="flex items-center rounded-2xl px-4 mb-3 cursor-pointer" style="min-height: 80px; background: var(--color-bg-card); box-shadow: var(--shadow-card);">
          <div class="flex items-center justify-center flex-shrink-0 rounded-full" style="width: 52px; height: 52px; background: #FFEBEE;">
            <span class="font-bold" style="font-size: 22px; color: #C62828; font-family: var(--font-family-num);">35</span>
          </div>
          <div class="flex-1 ml-4">
            <p class="font-bold" style="font-size: var(--font-size-body-lg); color: var(--color-text-primary); line-height: 1.3;">某品牌薯片</p>
            <p class="mt-0.5" style="font-size: var(--font-size-body-sm); color: #C62828; font-weight: var(--font-weight-medium);">高风险</p>
            <p class="mt-0.5" style="font-size: var(--font-size-caption); color: var(--color-text-tertiary);">2026-06-18</p>
          </div>
          <i data-lucide="chevron-right" style="width: 20px; height: 20px; color: var(--color-text-tertiary); flex-shrink: 0;"></i>
        </div>

      </div>

      <!-- 底部安全区域 -->
      <div style="height: var(--safe-area-bottom);"></div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
