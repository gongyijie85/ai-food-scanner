# AI食品配料表识别工具 - CI/CD 工作流
# 触发条件：push 到 main 分支 或 pull_request
# 功能：安装依赖、代码检查、单元测试、安全扫描

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: 代码质量检查
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: 代码格式检查 (black)
        # 检查全仓库，排除缓存/虚拟环境/worktrees目录
        run: black --check --diff --extend-exclude "(__pycache__|\.venv|venv|\.worktrees)" .

      - name: 代码风格检查 (flake8)
        # 检查全仓库 Python 文件；忽略行宽/换行风格/E402(sys.path插入后的导入)
        run: flake8 . --max-line-length=120 --ignore=E501,W503,E402 --exclude=__pycache__,.venv,venv,.worktrees

  # Job 2: 单元测试
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行单元测试
        run: pytest tests/ -v --tb=short
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: 生成测试报告
        if: always()
        run: pytest tests/ --junitxml=test-report.xml

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.xml

  # Job 3: 安全扫描
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装安全扫描工具
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: 依赖漏洞扫描 (safety)
        # safety 失败仅警告（外部 CVE 数据库可能误报），不阻断流水线
        continue-on-error: true
        run: safety check -r requirements.txt

      - name: 代码安全扫描 (bandit)
        # 扫描全仓库，阻断高风险发现
        run: bandit -r . -ll -ii -x __pycache__,.venv,venv

  # Job 4: 构建验证
  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 验证应用启动
        run: |
          # 检查全仓库语法
          python -m compileall -q .

          # 检查关键数据文件存在
          test -f data/gb2760_risk.csv
          test -f data/common_diseases.json
          test -f data/allergens.json
          test -f data/common_drugs.json
          test -f data/drug_food_conflicts.json

          echo "✓ 构建验证通过"
