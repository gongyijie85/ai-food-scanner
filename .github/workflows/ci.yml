# AI食品配料表识别工具 - CI/CD 工作流
# 触发条件：push 到 main 分支 或 pull_request
# 功能：安装依赖、代码检查、单元测试、安全扫描

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: 代码质量检查
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: 代码格式检查 (black)
        run: black --check --diff app.py
        continue-on-error: true

      - name: 导入排序检查 (isort)
        run: isort --check-only --diff app.py
        continue-on-error: true

      - name: 代码风格检查 (flake8)
        run: flake8 app.py --max-line-length=120 --ignore=E501,W503
        continue-on-error: true

  # Job 2: 单元测试
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行单元测试
        run: pytest tests/ -v --tb=short
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: 生成测试报告
        if: always()
        run: pytest tests/ --junitxml=test-report.xml
        continue-on-error: true

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.xml

  # Job 3: 安全扫描
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装安全扫描工具
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: 依赖漏洞扫描 (safety)
        run: safety check -r requirements.txt
        continue-on-error: true

      - name: 代码安全扫描 (bandit)
        run: bandit -r app.py -ll -ii
        continue-on-error: true

  # Job 4: 构建验证
  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 验证应用启动
        run: |
          # 检查 app.py 语法
          python -m py_compile app.py

          # 检查关键数据文件存在
          test -f data/gb2760_risk.csv
          test -f data/common_diseases.json
          test -f data/allergens.json
          test -f data/common_drugs.json
          test -f data/drug_food_conflicts.json

          echo "✓ 构建验证通过"
