<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>识别结果页 · 优化版</title>
  <style>
    :root {
      /* 色彩系统 */
      --primary-900: #1B5E20;
      --primary-700: #2E7D32;
      --primary-500: #43A047;
      --primary-100: #E8F5E9;
      --primary-50: #F1F8E9;

      --warning-900: #E65100;
      --warning-500: #FF9800;
      --warning-100: #FFF3E0;

      --danger-900: #C62828;
      --danger-500: #E53935;
      --danger-100: #FFEBEE;

      --gray-900: #212121;
      --gray-700: #616161;
      --gray-500: #9E9E9E;
      --gray-300: #E0E0E0;
      --gray-100: #F5F5F5;
      --white: #FFFFFF;
      --bg: #FAFAF5;

      /* 字体 */
      --font-cn: "PingFang SC", "Source Han Sans CN", "Microsoft YaHei", sans-serif;
      --font-num: "Roboto", "DIN Alternate", "Helvetica Neue", Arial, sans-serif;

      /* 字号：适老化 */
      --text-xs: 14px;
      --text-sm: 16px;
      --text-base: 18px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 30px;
      --text-3xl: 40px;

      /* 间距 */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;

      /* 圆角 */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;

      /* 阴影 */
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-cn);
      background: var(--bg);
      color: var(--gray-900);
      font-size: var(--text-base);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* 顶部导航 */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      padding: 0 var(--space-4);
      background: rgba(250, 250, 245, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--gray-300);
    }

    .nav-back {
      position: absolute;
      left: var(--space-4);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      background: var(--white);
      border: 1px solid var(--gray-300);
      color: var(--gray-700);
      font-size: var(--text-lg);
      cursor: pointer;
    }

    .nav-title {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--gray-900);
    }

    /* 页面容器 */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: var(--space-4) var(--space-4) calc(var(--space-8) + 80px);
    }

    /* ===== 评分英雄卡 ===== */
    .score-hero {
      position: relative;
      background: var(--primary-100);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .score-hero::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(67,160,71,0.12) 0%, transparent 70%);
    }

    .score-hero.caution { background: var(--warning-100); }
    .score-hero.caution::before {
      background: radial-gradient(circle, rgba(255,152,0,0.12) 0%, transparent 70%);
    }

    .score-hero.danger { background: var(--danger-100); }
    .score-hero.danger::before {
      background: radial-gradient(circle, rgba(229,57,53,0.12) 0%, transparent 70%);
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
      position: relative;
      z-index: 1;
    }

    .hero-product {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: var(--text-xl);
      font-weight: 700;
      line-height: 1.35;
      color: var(--gray-900);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-meta {
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      color: var(--gray-500);
    }

    /* 分数圈 */
    .score-circle {
      position: relative;
      flex-shrink: 0;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .score-circle::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid currentColor;
      opacity: 0.25;
      animation: pulseRing 2.2s ease-out infinite;
    }

    .score-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px dashed currentColor;
      opacity: 0.18;
      animation: rotateRing 14s linear infinite;
    }

    .score-hero .score-circle {
      color: var(--primary-500);
    }
    .score-hero.caution .score-circle { color: var(--warning-500); }
    .score-hero.danger .score-circle { color: var(--danger-500); }

    .score-number {
      font-family: var(--font-num);
      font-size: var(--text-3xl);
      font-weight: 700;
      line-height: 1;
      color: var(--primary-900);
    }

    .score-hero.caution .score-number { color: var(--warning-900); }
    .score-hero.danger .score-number { color: var(--danger-900); }

    .score-label {
      font-size: var(--text-xs);
      color: var(--gray-500);
      margin-top: var(--space-1);
    }

    /* 状态标签 */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-4);
      padding: var(--space-2) var(--space-3);
      background: var(--white);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--primary-700);
      box-shadow: var(--shadow-sm);
      position: relative;
      z-index: 1;
    }

    .score-hero.caution .status-pill { color: var(--warning-900); }
    .score-hero.danger .status-pill { color: var(--danger-900); }

    .status-pill svg {
      width: 18px;
      height: 18px;
    }

    .hero-subtitle {
      margin-top: var(--space-2);
      font-size: var(--text-base);
      color: var(--gray-700);
      position: relative;
      z-index: 1;
    }

    .hero-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-3);
      margin-top: var(--space-4);
      padding-top: var(--space-3);
      border-top: 1px solid rgba(0,0,0,0.06);
      position: relative;
      z-index: 1;
    }

    .disclaimer {
      font-size: var(--text-xs);
      color: var(--gray-500);
      line-height: 1.5;
      flex: 1;
    }

    .btn-replay {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--primary-700);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--primary-700);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
    }

    .score-hero.caution .btn-replay {
      border-color: var(--warning-900);
      color: var(--warning-900);
    }

    .score-hero.danger .btn-replay {
      border-color: var(--danger-900);
      color: var(--danger-900);
    }

    /* ===== 内容卡片 ===== */
    .card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-300);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .card-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      background: var(--primary-100);
      color: var(--primary-700);
      font-size: var(--text-base);
    }

    .card-title {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--gray-900);
    }

    .success-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3);
      background: var(--primary-50);
      border-radius: var(--radius-md);
      color: var(--primary-700);
      font-size: var(--text-base);
      font-weight: 500;
    }

    .success-row svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .advice-box {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--warning-100);
      border-radius: var(--radius-md);
      border-left: 4px solid var(--warning-500);
    }

    .advice-icon {
      font-size: var(--text-xl);
      flex-shrink: 0;
      line-height: 1.3;
    }

    .advice-text {
      font-size: var(--text-base);
      color: var(--gray-700);
      line-height: 1.6;
    }

    .expand-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) 0;
      color: var(--gray-900);
      font-weight: 600;
      cursor: pointer;
    }

    .expand-bar svg {
      width: 20px;
      height: 20px;
      color: var(--gray-500);
      transition: transform 0.2s ease;
    }

    .expand-bar.open svg {
      transform: rotate(180deg);
    }

    .ingredient-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      padding-top: var(--space-2);
      border-top: 1px solid var(--gray-300);
    }

    .ingredient-tag {
      padding: var(--space-1) var(--space-2);
      background: var(--gray-100);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      color: var(--gray-700);
    }

    /* ===== 语音控制 ===== */
    .voice-panel {
      margin-bottom: var(--space-4);
    }

    .btn-voice {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--text-lg);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    .btn-voice:active { transform: scale(0.98); }

    .btn-voice.primary {
      background: var(--primary-700);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(46,125,50,0.3);
      margin-bottom: var(--space-3);
    }

    .btn-voice.secondary {
      background: var(--white);
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
    }

    .btn-voice svg {
      width: 22px;
      height: 22px;
    }

    .speed-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) 0;
      color: var(--gray-700);
      font-size: var(--text-base);
      cursor: pointer;
    }

    .speed-toggle svg {
      width: 20px;
      height: 20px;
      color: var(--gray-500);
    }

    /* ===== 底部操作 ===== */
    .bottom-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      padding: var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom, 0px));
      background: var(--white);
      border-top: 1px solid var(--gray-300);
      display: flex;
      gap: var(--space-3);
      z-index: 20;
    }

    .btn-bottom {
      flex: 1;
      min-height: 56px;
      border-radius: var(--radius-lg);
      font-size: var(--text-lg);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .btn-bottom:active { transform: scale(0.98); }

    .btn-bottom.primary {
      background: var(--white);
      color: var(--primary-700);
      border: 2px solid var(--primary-700);
    }

    .btn-bottom.secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
    }

    .footer-note {
      text-align: center;
      font-size: var(--text-xs);
      color: var(--gray-500);
      margin-top: var(--space-4);
      padding-bottom: var(--space-4);
    }

    /* 动画 */
    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.3; }
      70% { transform: scale(1.14); opacity: 0; }
      100% { transform: scale(1.14); opacity: 0; }
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 演示开关 */
    .demo-switch {
      position: fixed;
      top: 64px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 30;
    }

    .demo-switch button {
      padding: 8px 12px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--white);
      color: var(--gray-700);
      box-shadow: var(--shadow-md);
    }

    .demo-switch button.active {
      background: var(--primary-700);
      color: var(--white);
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <button class="nav-back">←</button>
    <div class="nav-title">识别结果</div>
  </nav>

  <div class="demo-switch">
    <button onclick="setState('safe', 100)" class="active" id="btn-safe">安全 100</button>
    <button onclick="setState('caution', 72)" id="btn-caution">注意 72</button>
    <button onclick="setState('danger', 45)" id="btn-danger">危险 45</button>
  </div>

  <main class="page">
    <!-- 评分英雄区 -->
    <section class="score-hero safe" id="scoreHero">
      <div class="hero-top">
        <div class="hero-product">
          <h1 class="product-name">低GI益生元鲜蒸山楂糕</h1>
          <p class="product-meta">配料表识别于 2026-07-14</p>
        </div>
        <div class="score-circle" id="scoreCircle">
          <div class="score-ring"></div>
          <span class="score-number" id="scoreNumber">0</span>
          <span class="score-label">安全分</span>
        </div>
      </div>

      <div class="status-pill" id="statusPill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span>暂未发现已知高风险提示</span>
      </div>

      <p class="hero-subtitle" id="heroSubtitle">按当前档案暂未发现高风险配料</p>

      <div class="hero-footer">
        <p class="disclaimer">结果仅供参考，不构成医疗或饮食建议。如有过敏史或特殊疾病，请咨询专业医师。</p>
        <button class="btn-replay">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          慢速重听
        </button>
      </div>
    </section>

    <!-- 添加剂清单 -->
    <section class="card">
      <div class="card-header">
        <div class="card-icon">🧾</div>
        <div class="card-title">添加剂清单</div>
      </div>
      <div class="success-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="16 9 10.5 15 8 12.5"/>
        </svg>
        <span>未识别到需要关注的食品添加剂</span>
      </div>
    </section>

    <!-- 一般饮食建议 -->
    <section class="card">
      <div class="card-header">
        <div class="card-icon" style="background: var(--warning-100); color: var(--warning-900);">💡</div>
        <div class="card-title">一般饮食建议</div>
      </div>
      <div class="advice-box">
        <span class="advice-icon">ℹ️</span>
        <p class="advice-text">普通人群可适量食用，建议保持均衡饮食，具体请咨询医生或营养师。</p>
      </div>
    </section>

    <!-- 查看全部配料 -->
    <section class="card">
      <div class="expand-bar" id="expandBar" onclick="toggleExpand()">
        <span>查看全部配料</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="ingredient-tags" id="ingredientTags" style="display: none;">
        <span class="ingredient-tag">山楂</span>
        <span class="ingredient-tag">低聚果糖</span>
        <span class="ingredient-tag">浓缩苹果汁</span>
        <span class="ingredient-tag">水</span>
      </div>
    </section>

    <!-- 语音控制 -->
    <section class="voice-panel">
      <button class="btn-voice primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        一键播报全部结果
      </button>
      <button class="btn-voice secondary">停止</button>

      <div class="speed-toggle">
        <span>语速调整</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </section>

    <p class="footer-note">AI识别仅供参考，请以包装原文为准</p>
  </main>

  <!-- 底部固定操作 -->
  <div class="bottom-actions">
    <button class="btn-bottom primary">再扫一个</button>
    <button class="btn-bottom secondary">返回首页</button>
  </div>

  <script>
    const stateMap = {
      safe: {
        label: '暂未发现已知高风险提示',
        subtitle: '按当前档案暂未发现高风险配料',
        pillIcon: '<polyline points="20 6 9 17 4 12"/>'
      },
      caution: {
        label: '特定人群注意',
        subtitle: '含少量需注意的成分',
        pillIcon: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'
      },
      danger: {
        label: '含多项需关注成分',
        subtitle: '该食品含多种高关注配料，建议查看详情后再选择',
        pillIcon: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
      }
    };

    const hero = document.getElementById('scoreHero');
    const circle = document.getElementById('scoreCircle');
    const numberEl = document.getElementById('scoreNumber');
    const pill = document.getElementById('statusPill');
    const subtitle = document.getElementById('heroSubtitle');
    let currentScore = 0;

    function animateScore(target) {
      const start = currentScore;
      const duration = 900;
      const startTime = performance.now();

      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        const value = Math.round(start + (target - start) * ease);
        numberEl.textContent = value;
        if (progress < 1) requestAnimationFrame(step);
        else currentScore = target;
      }
      requestAnimationFrame(step);
    }

    function setState(state, score) {
      // 切换按钮高亮
      document.querySelectorAll('.demo-switch button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + state).classList.add('active');

      // 更新卡片状态色
      hero.classList.remove('safe', 'caution', 'danger');
      hero.classList.add(state);

      // 重触发圆圈入场动画
      circle.style.animation = 'none';
      void circle.offsetWidth;
      circle.style.animation = '';

      // 更新标签文案
      const info = stateMap[state];
      pill.querySelector('svg').innerHTML = info.pillIcon;
      pill.querySelector('span').textContent = info.label;
      subtitle.textContent = info.subtitle;

      // 滚动分数
      animateScore(score);
    }

    function toggleExpand() {
      const bar = document.getElementById('expandBar');
      const tags = document.getElementById('ingredientTags');
      bar.classList.toggle('open');
      tags.style.display = tags.style.display === 'none' ? 'flex' : 'none';
    }

    // 首次加载动画
    window.addEventListener('load', () => {
      setTimeout(() => animateScore(100), 300);
    });
  </script>
</body>
</html>
