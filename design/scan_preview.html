<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫描识别 - 页面优化预览</title>
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #E8F5E9;
            --color-primary-dark: #1B5E20;
            --color-secondary: #FF9800;
            --color-bg: #FAFAF5;
            --color-bg-card: #FFFFFF;
            --color-text-primary: #212121;
            --color-text-secondary: #616161;
            --color-text-tertiary: #9E9E9E;
            --color-text-inverse: #FFFFFF;
            --color-border: #E0E0E0;
            --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --radius-full: 9999px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family-cn);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-shell {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: var(--color-bg);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--color-bg-card);
            box-shadow: var(--shadow-card);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .top-nav-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-primary-light);
            color: var(--color-primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-nav-title { font-size: 18px; font-weight: 700; }
        .top-nav-spacer { width: 40px; }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        /* 拍照提示 */
        .scan-tip {
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        /* 取景框区域 */
        .camera-frame-wrap {
            flex: 1;
            min-height: 360px;
            background: #000;
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 模拟相机画面背景 */
        .camera-frame-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            opacity: 0.9;
        }

        /* 扫描框 */
        .scan-frame {
            position: relative;
            width: 80%;
            max-width: 300px;
            aspect-ratio: 4 / 3;
            border-radius: 12px;
            z-index: 1;
        }

        /* 四角角标 */
        .corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: #4CAF50;
            border-style: solid;
            border-width: 0;
        }

        .corner-tl { top: 0; left: 0; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 8px; }
        .corner-tr { top: 0; right: 0; border-top-width: 4px; border-right-width: 4px; border-top-right-radius: 8px; }
        .corner-bl { bottom: 0; left: 0; border-bottom-width: 4px; border-left-width: 4px; border-bottom-left-radius: 8px; }
        .corner-br { bottom: 0; right: 0; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 8px; }

        /* 扫描线 */
        .scan-line {
            position: absolute;
            left: 8px;
            right: 8px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #66BB6A, transparent);
            animation: scan-sweep 2.5s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes scan-sweep {
            0% { top: 8px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: calc(100% - 10px); opacity: 0; }
        }

        /* 框内提示文字 */
        .scan-frame-text {
            position: absolute;
            bottom: -40px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
        }

        /* 底部操作区 */
        .scan-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 24px;
        }

        .action-row {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            height: 56px;
            border-radius: var(--radius-full);
            border: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s ease;
        }

        .action-btn:active { transform: scale(0.98); }

        .action-btn-primary {
            background: linear-gradient(135deg, #43A047 0%, #2E7D32 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        .action-btn-secondary {
            background: white;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
        }

        .action-hint {
            text-align: center;
            font-size: 13px;
            color: var(--color-text-tertiary);
        }

        /* 桌面端 */
        @media (min-width: 768px) {
            body { background: #E8E8E0; padding: 40px 20px; }
            .phone-shell {
                min-height: 800px;
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.15);
                overflow: hidden;
            }
            .camera-frame-wrap { min-height: 420px; }
        }
    </style>
</head>
<body>
    <div class="phone-shell">
        <header class="top-nav">
            <button class="top-nav-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <span class="top-nav-title">扫描识别</span>
            <div class="top-nav-spacer"></div>
        </header>

        <main class="main-content">
            <p class="scan-tip">对准包装上的配料表<br>保证光线充足、文字清晰</p>

            <div class="camera-frame-wrap">
                <div class="scan-frame">
                    <div class="corner corner-tl"></div>
                    <div class="corner corner-tr"></div>
                    <div class="corner corner-bl"></div>
                    <div class="corner corner-br"></div>
                    <div class="scan-line"></div>
                    <div class="scan-frame-text">将配料表放入框内</div>
                </div>
            </div>

            <div class="scan-actions">
                <div class="action-row">
                    <button class="action-btn action-btn-primary">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                        拍照
                    </button>
                    <button class="action-btn action-btn-secondary">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                        从相册选择
                    </button>
                </div>
                <p class="action-hint">支持 jpg / png，最大 5MB</p>
            </div>
        </main>
    </div>
</body>
</html>
