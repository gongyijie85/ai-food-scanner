<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 V2 预览 - 历史记录 + 底部双按钮</title>
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #E8F5E9;
            --color-primary-dark: #1B5E20;
            --color-primary-gradient: linear-gradient(135deg, #43A047 0%, #2E7D32 100%);
            --color-bg: #FAFAF5;
            --color-bg-card: #FFFFFF;
            --color-text-primary: #212121;
            --color-text-secondary: #616161;
            --color-text-tertiary: #9E9E9E;
            --color-text-inverse: #FFFFFF;
            --color-border: #E0E0E0;
            --state-success: #43A047;
            --state-warning: #F57F17;
            --state-error: #E53935;
            --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", "Arial", sans-serif;
            --radius-full: 9999px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family-cn);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-shell {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: var(--color-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            padding-bottom: 160px;
        }

        /* 顶部标题区 */
        .top-header {
            padding: 20px 16px 16px;
            background: var(--color-bg-card);
            box-shadow: var(--shadow-card);
        }

        .top-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .top-subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 最近识别 */
        .section-title {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            cursor: pointer;
            transition: transform 0.15s ease;
            border-left: 5px solid var(--color-border);
        }

        .history-card:active { transform: scale(0.98); }
        .history-card.safe { border-left-color: var(--state-success); }
        .history-card.caution { border-left-color: var(--state-warning); }
        .history-card.danger { border-left-color: var(--state-error); }

        .score-badge {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            font-family: var(--font-family-num);
        }

        .score-badge.safe { background: var(--state-success); }
        .score-badge.caution { background: var(--state-warning); }
        .score-badge.danger { background: var(--state-error); }

        .score-badge-value {
            font-size: 20px;
            font-weight: 700;
            line-height: 1;
        }

        .score-badge-label {
            font-size: 10px;
            margin-top: 2px;
        }

        .history-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-name {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-meta {
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .history-arrow {
            color: var(--color-text-tertiary);
            flex-shrink: 0;
        }

        .view-all-link {
            text-align: center;
            padding: 12px;
            color: var(--color-primary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* 底部固定操作栏 */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            background: rgba(250, 250, 245, 0.98);
            border-top: 1px solid var(--color-border);
            padding: 16px;
            display: flex;
            flex-direction: row;
            gap: 12px;
            z-index: 40;
        }

        .action-btn {
            flex: 1;
            height: 54px;
            border-radius: var(--radius-full);
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: transform 0.15s ease;
        }

        .action-btn:active { transform: scale(0.98); }

        .action-btn-primary {
            background: var(--color-primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        .action-btn-secondary {
            background: white;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
        }

        /* 免责声明 */
        .disclaimer {
            text-align: center;
            font-size: 12px;
            color: var(--color-text-tertiary);
            padding: 8px 16px 0;
            line-height: 1.5;
        }

        /* 桌面端 */
        @media (min-width: 768px) {
            body { background: #E8E8E0; padding: 40px 20px; }
            .phone-shell {
                min-height: 800px;
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.15);
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="phone-shell">
        <header class="top-header">
            <h1 class="top-title">食品配料表识别</h1>
            <p class="top-subtitle">拍照即懂，吃得更安心</p>
        </header>

        <main class="main-content">
            <section>
                <h2 class="section-title">🕐 最近识别</h2>
                <div class="history-list">
                    <div class="history-card safe">
                        <div class="score-badge safe">
                            <div class="score-badge-value">92</div>
                            <div class="score-badge-label">安全</div>
                        </div>
                        <div class="history-info">
                            <div class="history-name">鲜牛奶 250ml</div>
                            <div class="history-meta">1种添加剂 · 2026-07-09</div>
                        </div>
                        <div class="history-arrow">➡️</div>
                    </div>

                    <div class="history-card caution">
                        <div class="score-badge caution">
                            <div class="score-badge-value">70</div>
                            <div class="score-badge-label">注意</div>
                        </div>
                        <div class="history-info">
                            <div class="history-name">某品牌无糖苏打饼干</div>
                            <div class="history-meta">3种添加剂 · 2026-07-08</div>
                        </div>
                        <div class="history-arrow">➡️</div>
                    </div>

                    <div class="history-card danger">
                        <div class="score-badge danger">
                            <div class="score-badge-value">45</div>
                            <div class="score-badge-label">高风险</div>
                        </div>
                        <div class="history-info">
                            <div class="history-name">某品牌辣条</div>
                            <div class="history-meta">7种添加剂 · 2026-07-06</div>
                        </div>
                        <div class="history-arrow">➡️</div>
                    </div>
                </div>
                <div class="view-all-link">查看全部历史记录</div>
            </section>

            <!-- 空状态示例（默认隐藏，有历史记录时显示上方） -->
            <section style="display:none;">
                <h2 class="section-title">🕐 最近识别</h2>
                <div class="empty-state">
                    <div class="empty-state-icon">📷</div>
                    <p>还没有识别记录</p>
                    <p style="font-size:13px;margin-top:4px;">点击下方拍照按钮开始</p>
                </div>
            </section>

            <p class="disclaimer">AI识别仅供参考，请以包装原文为准</p>
        </main>

        <div class="action-bar">
            <button class="action-btn action-btn-primary" onclick="alert('跳转到扫描页，直接打开相机')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                拍照识别
            </button>
            <button class="action-btn action-btn-secondary" onclick="alert('跳转到健康档案页')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                健康档案
            </button>
        </div>
    </div>
</body>
</html>
