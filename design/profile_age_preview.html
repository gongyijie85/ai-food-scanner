<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康档案年龄输入优化预览</title>
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #E8F5E9;
            --color-bg: #FAFAF5;
            --color-bg-card: #FFFFFF;
            --color-text-primary: #212121;
            --color-text-secondary: #616161;
            --color-border: #E0E0E0;
            --radius-full: 9999px;
            --radius-lg: 16px;
            --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
            --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", "Microsoft YaHei", -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family-cn); background: var(--color-bg); min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .phone { width: 100%; max-width: 414px; background: var(--color-bg); padding: 16px; }
        .card { background: var(--color-bg-card); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); margin-bottom: 16px; }
        .section-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .section-desc { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 14px; }

        /* 方案 A：滑块 */
        .age-slider-wrap { text-align: center; padding: 10px 0; }
        .age-value { font-size: 48px; font-weight: 700; color: var(--color-primary); line-height: 1; margin-bottom: 8px; }
        .age-label { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 16px; }
        .slider { width: 100%; height: 12px; border-radius: var(--radius-full); background: var(--color-primary-light); -webkit-appearance: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--color-primary); cursor: pointer; box-shadow: 0 2px 8px rgba(46,125,50,0.4); }
        .slider-scale { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; }

        /* 方案 B：大号加减按钮 */
        .age-stepper { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 10px 0; }
        .stepper-btn { width: 56px; height: 56px; border-radius: 50%; border: none; background: var(--color-primary); color: white; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(46,125,50,0.3); }
        .stepper-value { min-width: 80px; text-align: center; }
        .stepper-value .num { font-size: 40px; font-weight: 700; color: var(--color-primary); line-height: 1; }
        .stepper-value .unit { font-size: 14px; color: var(--color-text-secondary); }

        /* 方案 C：年龄段快速选择 */
        .age-chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .age-chip { padding: 10px 18px; border-radius: var(--radius-full); border: 1px solid var(--color-border); background: white; font-size: 15px; cursor: pointer; }
        .age-chip.selected { background: var(--color-primary); color: white; border-color: var(--color-primary); }
    </style>
</head>
<body>
    <div class="phone">
        <div class="card">
            <div class="section-title">📝 基本信息</div>
            <div class="section-desc">填写后，识别结果会根据您的健康情况给出个性化建议</div>

            <div style="margin-bottom: 24px;">
                <label style="font-size:14px;color:var(--color-text-secondary);display:block;margin-bottom:8px;">称呼（可选）</label>
                <input style="width:100%;height:48px;border:1px solid var(--color-border);border-radius:12px;padding:0 12px;font-size:16px;" placeholder="如：张奶奶" />
            </div>

            <label style="font-size:14px;color:var(--color-text-secondary);display:block;margin-bottom:12px;">年龄</label>

            <!-- 方案 A：滑块 -->
            <div class="age-slider-wrap">
                <div class="age-value">60<span style="font-size:20px;">岁</span></div>
                <div class="age-label">左右拖动调整年龄</div>
                <input type="range" min="1" max="120" value="60" class="slider" />
                <div class="slider-scale"><span>1岁</span><span>60岁</span><span>120岁</span></div>
            </div>

            <hr style="border:0;border-top:1px solid var(--color-border);margin:24px 0;">

            <!-- 方案 B：大号加减按钮 -->
            <div class="age-stepper">
                <button class="stepper-btn">−</button>
                <div class="stepper-value">
                    <div class="num">60</div>
                    <div class="unit">岁</div>
                </div>
                <button class="stepper-btn">+</button>
            </div>

            <hr style="border:0;border-top:1px solid var(--color-border);margin:24px 0;">

            <!-- 方案 C：年龄段快速选择 -->
            <div class="age-chips">
                <div class="age-chip">40岁以下</div>
                <div class="age-chip">40-59岁</div>
                <div class="age-chip selected">60-79岁</div>
                <div class="age-chip">80岁以上</div>
            </div>
        </div>
    </div>
</body>
</html>
