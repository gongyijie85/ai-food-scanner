<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首次引导 - 页面优化预览</title>
    <style id="theme-vars">
/* Brand CSS — AI Food Scanner v2 */
/* Inspired by glassmorphism + gradient hero + ring animation style */
:root {
  /* ── Green scale (full) ── */
  --green-50: #f0fdf4;
  --green-100: #dcfce7;
  --green-200: #bbf7d0;
  --green-300: #86efac;
  --green-400: #4ade80;
  --green-500: #22c55e;
  --green-600: #16a34a;
  --green-700: #15803d;
  --green-800: #166534;
  --green-900: #14532d;

  /* Semantic */
  --amber-50: #fffbeb;
  --amber-100: #fef3c7;
  --amber-500: #f59e0b;
  --amber-600: #d97706;
  --amber-700: #b45309;

  --sky-50: #f0f9ff;
  --sky-100: #e0f2fe;
  --sky-500: #0ea5e9;
  --sky-600: #0284c7;
  --sky-700: #0369a1;

  --red-50: #fef2f2;
  --red-500: #ef4444;

  /* Neutrals */
  --gray-25: #fcfcfd;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;

  /* Surface */
  --color-bg: #f8faf8;
  --color-bg-card: #ffffff;
  --color-text-primary: #111827;
  --color-text-secondary: #4b5563;
  --color-text-tertiary: #9ca3af;
  --color-text-inverse: #ffffff;
  --color-border: #e5e7eb;
  --color-divider: #f3f4f6;

  /* On-dark text (inside score hero) */
  --text-on-dark: #ffffff;
  --text-on-dark-60: rgba(255,255,255,0.6);
  --text-on-dark-55: rgba(255,255,255,0.55);
  --text-on-dark-45: rgba(255,255,255,0.45);
  --text-on-dark-70: rgba(255,255,255,0.7);
  --text-on-dark-15: rgba(255,255,255,0.15);
  --overlay-dark-16: rgba(255,255,255,0.16);
  --overlay-dark-20: rgba(255,255,255,0.2);
  --overlay-dark-10: rgba(255,255,255,0.1);
  --overlay-dark-08: rgba(255,255,255,0.08);
  --border-dark-12: rgba(255,255,255,0.12);
  --border-dark-04: rgba(0,0,0,0.04);
  --border-dark-03: rgba(0,0,0,0.03);
  --surface-glass: rgba(255,255,255,0.88);

  /* Typography */
  --font-family: 'DM Sans', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-family-num: 'DM Sans', 'DIN Alternate', 'Helvetica Neue', sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-score: 52px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.7;
  --tracking-tight: -0.02em;
  --tracking-wide: 0.02em;

  /* Shape — larger radius matching reference */
  --radius-full: 9999px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;

  /* Depth — layered shadows */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-card: 0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);
  --shadow-elevated: 0 8px 24px rgba(0,0,0,0.08);
  --shadow-score: 0 8px 32px rgba(22,163,74,0.12), 0 2px 8px rgba(22,163,74,0.08);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <div class="phone-shell">
        <button class="skip-btn">跳过</button>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-fill" style="width: 25%"></div>
        </div>

        <main class="main-content">
            <!-- 第 1 步：欢迎 -->
            <div class="onboard-hero">
                <div class="onboard-icon">🥫</div>
                <h1 class="onboard-title">AI 食品配料表识别</h1>
                <p class="onboard-subtitle">拍照即懂，让老人和孩子吃得更安心</p>
            </div>

            <div class="steps-group">
                <div class="step-card">
                    <div class="step-card-num">1</div>
                    <div class="step-card-body">
                        <div class="step-card-title">拍照</div>
                        <div class="step-card-desc">对准包装上的配料表拍照</div>
                    </div>
                </div>
                <div class="step-card">
                    <div class="step-card-num">2</div>
                    <div class="step-card-body">
                        <div class="step-card-title">识别</div>
                        <div class="step-card-desc">AI 自动识别配料并分析风险</div>
                    </div>
                </div>
                <div class="step-card">
                    <div class="step-card-num">3</div>
                    <div class="step-card-body">
                        <div class="step-card-title">看结果</div>
                        <div class="step-card-desc">红黄绿三色评分 + 语音播报</div>
                    </div>
                </div>
            </div>

            <!-- 示例：第 2 步的疾病选择 -->
            <div style="margin-bottom:40px; display:none;" id="health-step">
                <h2 class="onboard-title" style="font-size:22px;">您属于哪类人群？</h2>
                <p class="onboard-subtitle" style="margin-bottom:20px;">已为您预选常见选项，可多选</p>
                <div class="condition-grid">
                    <div class="condition-card selected">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">❤️</div>
                        <div class="condition-card-name">脑梗/心血管</div>
                    </div>
                    <div class="condition-card selected">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🫀</div>
                        <div class="condition-card-name">高血压</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🩸</div>
                        <div class="condition-card-name">糖尿病</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🦴</div>
                        <div class="condition-card-name">痛风</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部按钮 -->
        <div class="action-bar">
            <button class="action-btn action-btn-secondary">上一步</button>
            <button class="action-btn action-btn-primary">下一步</button>
        </div>
    </div>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-shell {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: var(--color-bg-card);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 跳过按钮 - 毛玻璃风格 */
        .skip-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-full);
            border: 1px solid var(--gray-200);
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
            font-family: var(--font-family);
            cursor: pointer;
            z-index: 10;
            transition: background 0.15s ease;
        }

        .skip-btn:hover {
            background: rgba(255,255,255,0.95);
        }

        /* 进度条 */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--border-dark-04);
        }

        .progress-fill {
            height: 100%;
            background: var(--green-500);
            width: 25%;
            transition: width 0.3s ease;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 56px var(--space-6) var(--space-6);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 英雄区 */
        .onboard-hero {
            text-align: center;
            margin-bottom: var(--space-10);
        }

        .onboard-icon {
            width: 140px;
            height: 140px;
            margin: 0 auto var(--space-6);
            background: linear-gradient(135deg, var(--green-600), var(--green-500));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            box-shadow: 0 12px 32px rgba(34, 197, 94, 0.25);
        }

        .onboard-title {
            font-size: 28px;
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--space-3);
            line-height: var(--line-height-tight);
            letter-spacing: var(--tracking-tight);
            color: var(--color-text-primary);
        }

        .onboard-subtitle {
            font-size: var(--font-size-base);
            color: var(--color-text-secondary);
            line-height: var(--line-height-relaxed);
        }

        /* 步骤卡片组 */
        .steps-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            margin-bottom: var(--space-10);
        }

        .step-card {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4);
            background: var(--color-bg-card);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-dark-04);
        }

        .step-card-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--green-50);
            color: var(--green-600);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-bold);
            flex-shrink: 0;
        }

        .step-card-body { flex: 1; }

        .step-card-title {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--space-1);
            color: var(--color-text-primary);
        }

        .step-card-desc {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            line-height: var(--line-height-normal);
        }

        /* 疾病选择网格 */
        .condition-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-3);
            margin-bottom: var(--space-10);
        }

        .condition-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            min-height: 96px;
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            background: var(--color-bg-card);
            border: 2px solid var(--color-border);
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
        }

        .condition-card.selected {
            background: var(--green-50);
            border-color: var(--green-500);
        }

        .condition-card-check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--green-500);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.15s ease;
        }

        .condition-card.selected .condition-card-check {
            opacity: 1;
            transform: scale(1);
        }

        .condition-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.15s ease;
        }

        .condition-card.selected .condition-card-icon {
            background: var(--green-500);
        }

        .condition-card-name {
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
        }

        /* 底部按钮区 */
        .action-bar {
            padding: var(--space-4) var(--space-6) var(--space-8);
            background: var(--color-bg-card);
            border-top: 1px solid var(--color-divider);
            display: flex;
            gap: var(--space-3);
        }

        .action-btn {
            flex: 1;
            height: 52px;
            border-radius: var(--radius-full);
            border: none;
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            font-family: var(--font-family);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .action-btn:active { transform: scale(0.98); }

        .action-btn-primary {
            background: linear-gradient(135deg, var(--green-600), var(--green-500));
            color: var(--color-text-inverse);
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35);
        }

        .action-btn-primary:hover {
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.45);
        }

        .action-btn-secondary {
            background: var(--color-bg);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
        }

        /* 桌面端 */
        @media (min-width: 768px) {
            body { background: var(--gray-100); padding: 40px 20px; }
            .phone-shell {
                min-height: 800px;
                border-radius: var(--radius-2xl);
                box-shadow: var(--shadow-elevated);
                overflow: hidden;
            }
        }
    </style>
</body>
</html>
