<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配：让页面宽度等于设备宽度，初始不缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食品配料表识别 - 首页优化预览</title>
    <style>
        /* ========== 设计系统变量 ========== */
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #E8F5E9;
            --color-primary-dark: #1B5E20;
            --color-primary-gradient: linear-gradient(135deg, #43A047 0%, #2E7D32 100%);
            --color-secondary: #FF9800;
            --color-secondary-light: #FFF3E0;
            --color-secondary-dark: #E65100;
            --color-bg: #FAFAF5;
            --color-bg-card: #FFFFFF;
            --color-text-primary: #212121;
            --color-text-secondary: #616161;
            --color-text-tertiary: #9E9E9E;
            --color-text-inverse: #FFFFFF;
            --color-border: #E0E0E0;
            --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --radius-full: 9999px;
            --radius-lg: 16px;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-button: 0 6px 20px rgba(46, 125, 50, 0.35);
            --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* ========== 页面基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-cn);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 手机外壳：在桌面端模拟手机显示 */
        .phone-shell {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: var(--color-bg);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ========== 顶部导航栏 ========== */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--color-bg-card);
            box-shadow: var(--shadow-card);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        /* 顶部左侧：放主标题和副标题 */
        .top-nav-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .top-nav-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text-primary);
            line-height: 1.3;
        }

        .top-nav-subtitle {
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.3;
        }

        /* 健康档案按钮 */
        .top-nav-btn {
            height: 40px;
            padding: 0 16px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            color: var(--color-primary);
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .top-nav-btn:hover {
            background: #C8E6C9;
        }

        .top-nav-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        /* 首页扫描聚合卡片 */
        .home-scan-card {
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 20px 16px;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 健康标签行 */
        .health-tags-row {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 24px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }

        .health-tags-row::-webkit-scrollbar {
            display: none;
        }

        .health-tag {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            background: var(--color-secondary-light);
            color: var(--color-secondary-dark);
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .health-tag:active {
            transform: scale(0.96);
        }

        .health-tag svg {
            width: 16px;
            height: 16px;
        }

        /* 扫描入口区域 */
        .home-scan-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 0 8px;
            position: relative;
        }

        /* 提示气泡：放在按钮上方，避免和按钮重叠 */
        .hint-bubble {
            position: relative;
            margin-bottom: 16px;
            background: var(--color-secondary);
            color: var(--color-text-inverse);
            padding: 8px 18px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow-elevated);
            animation: hint-bounce 2s ease-in-out infinite;
        }

        /* 气泡下方小三角 */
        .hint-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--color-secondary);
        }

        @keyframes hint-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* 大扫描按钮容器 */
        .scan-button-wrap {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 脉冲光环 */
        .scan-button-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(46, 125, 50, 0.3);
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.35); opacity: 0; }
        }

        /* 真正可点击的大按钮 */
        .scan-button {
            position: relative;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: var(--color-primary-gradient);
            color: var(--color-text-inverse);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-button), 0 0 0 6px rgba(46, 125, 50, 0.1);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .scan-button:hover {
            transform: scale(1.02);
        }

        .scan-button:active {
            transform: scale(0.95);
            box-shadow: var(--shadow-card), 0 0 0 3px rgba(46, 125, 50, 0.15);
        }

        /* 按钮内相机图标 */
        .scan-button-icon {
            width: 52px;
            height: 52px;
        }

        /* 按钮内文字 */
        .scan-button-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.3;
        }

        /* 按钮下方辅助说明 */
        .scan-button-hint {
            margin-top: 20px;
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }

        /* 底部免责声明 */
        .disclaimer-text {
            margin-top: auto;
            padding: 16px 8px 24px;
            text-align: center;
            font-size: 13px;
            color: var(--color-text-tertiary);
            line-height: 1.5;
        }

        /* ========== 桌面端适配 ========== */
        @media (min-width: 768px) {
            body {
                background: #E8E8E0;
                padding: 40px 20px;
            }

            .phone-shell {
                min-height: 800px;
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
                overflow: hidden;
            }

            .home-scan-card {
                padding: 28px 24px;
            }

            .scan-button-wrap {
                width: 220px;
                height: 220px;
            }

            .scan-button {
                width: 210px;
                height: 210px;
            }

            .scan-button-icon {
                width: 60px;
                height: 60px;
            }

            .scan-button-text {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- 手机外壳容器 -->
    <div class="phone-shell">
        <!-- 顶部导航栏 -->
        <header class="top-nav">
            <div class="top-nav-left">
                <h1 class="top-nav-title">食品配料表识别</h1>
                <p class="top-nav-subtitle">拍照即懂，吃得更安心</p>
            </div>
            <button class="top-nav-btn">
                <!-- 心形图标 -->
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                健康档案
            </button>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 扫描聚合卡片 -->
            <section class="home-scan-card">
                <!-- 健康标签行 -->
                <div class="health-tags-row">
                    <button class="health-tag">
                        <!-- 心脏图标 -->
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        脑梗/心血管
                    </button>
                    <button class="health-tag">
                        <!-- 血糖仪图标 -->
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        糖尿病
                    </button>
                    <button class="health-tag">
                        <!-- 血压图标 -->
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        高血压
                    </button>
                </div>

                <!-- 扫描入口 -->
                <div class="home-scan-area">
                    <!-- 提示气泡：放在按钮上方 -->
                    <div class="hint-bubble">点击大按钮开始</div>

                    <!-- 大扫描按钮 -->
                    <div class="scan-button-wrap">
                        <!-- 脉冲光环装饰 -->
                        <div class="scan-button-pulse"></div>
                        <button class="scan-button" onclick="alert('这里会跳转到扫描页')">
                            <!-- 相机图标 -->
                            <svg class="scan-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                <circle cx="12" cy="13" r="4"></circle>
                            </svg>
                            <span class="scan-button-text">扫描<br>配料表</span>
                        </button>
                    </div>

                    <!-- 按钮下方辅助说明 -->
                    <p class="scan-button-hint">对准包装上的配料表拍照<br>光线充足识别更准确</p>
                </div>
            </section>

            <!-- 底部免责声明 -->
            <p class="disclaimer-text">AI识别仅供参考，请以包装原文为准</p>
        </main>
    </div>
</body>
</html>
