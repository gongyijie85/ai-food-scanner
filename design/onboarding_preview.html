<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首次引导 - 页面优化预览</title>
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #E8F5E9;
            --color-primary-gradient: linear-gradient(135deg, #43A047 0%, #2E7D32 100%);
            --color-secondary: #FF9800;
            --color-bg: #FAFAF5;
            --color-bg-card: #FFFFFF;
            --color-text-primary: #212121;
            --color-text-secondary: #616161;
            --color-text-tertiary: #9E9E9E;
            --color-text-inverse: #FFFFFF;
            --color-border: #E0E0E0;
            --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --radius-full: 9999px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family-cn);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-shell {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: var(--color-bg);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 跳过按钮 */
        .skip-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            border: 1px solid var(--color-border);
            background: rgba(255,255,255,0.8);
            color: var(--color-text-secondary);
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
        }

        /* 进度条 */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0,0,0,0.06);
        }

        .progress-fill {
            height: 100%;
            background: var(--color-primary);
            width: 25%;
            transition: width 0.3s ease;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 56px 24px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 英雄区 */
        .onboard-hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .onboard-icon {
            width: 140px;
            height: 140px;
            margin: 0 auto 24px;
            background: var(--color-primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            box-shadow: 0 12px 32px rgba(46, 125, 50, 0.25);
        }

        .onboard-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .onboard-subtitle {
            font-size: 16px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        /* 步骤卡片组 */
        .steps-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .step-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--color-bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--color-border);
        }

        .step-card-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--color-primary-light);
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-card-body { flex: 1; }

        .step-card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .step-card-desc {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        /* 疾病选择网格 */
        .condition-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .condition-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 96px;
            padding: 14px;
            border-radius: var(--radius-md);
            background: var(--color-bg-card);
            border: 2px solid var(--color-border);
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
        }

        .condition-card.selected {
            background: var(--color-primary-light);
            border-color: var(--color-primary);
        }

        .condition-card-check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.15s ease;
        }

        .condition-card.selected .condition-card-check {
            opacity: 1;
            transform: scale(1);
        }

        .condition-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .condition-card.selected .condition-card-icon {
            background: var(--color-primary);
        }

        .condition-card-name {
            font-size: 15px;
            font-weight: 600;
        }

        /* 底部按钮区 */
        .action-bar {
            padding: 16px 24px 32px;
            background: var(--color-bg-card);
            border-top: 1px solid var(--color-border);
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            height: 52px;
            border-radius: var(--radius-full);
            border: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
        }

        .action-btn:active { transform: scale(0.98); }

        .action-btn-primary {
            background: var(--color-primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        .action-btn-secondary {
            background: var(--color-bg);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
        }

        /* 桌面端 */
        @media (min-width: 768px) {
            body { background: #E8E8E0; padding: 40px 20px; }
            .phone-shell {
                min-height: 800px;
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.15);
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="phone-shell">
        <button class="skip-btn">跳过</button>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-fill" style="width: 25%"></div>
        </div>

        <main class="main-content">
            <!-- 第 1 步：欢迎 -->
            <div class="onboard-hero">
                <div class="onboard-icon">🥫</div>
                <h1 class="onboard-title">AI 食品配料表识别</h1>
                <p class="onboard-subtitle">拍照即懂，让老人和孩子吃得更安心</p>
            </div>

            <div class="steps-group">
                <div class="step-card">
                    <div class="step-card-num">1</div>
                    <div class="step-card-body">
                        <div class="step-card-title">拍照</div>
                        <div class="step-card-desc">对准包装上的配料表拍照</div>
                    </div>
                </div>
                <div class="step-card">
                    <div class="step-card-num">2</div>
                    <div class="step-card-body">
                        <div class="step-card-title">识别</div>
                        <div class="step-card-desc">AI 自动识别配料并分析风险</div>
                    </div>
                </div>
                <div class="step-card">
                    <div class="step-card-num">3</div>
                    <div class="step-card-body">
                        <div class="step-card-title">看结果</div>
                        <div class="step-card-desc">红黄绿三色评分 + 语音播报</div>
                    </div>
                </div>
            </div>

            <!-- 示例：第 2 步的疾病选择 -->
            <div style="margin-bottom:40px; display:none;" id="health-step">
                <h2 class="onboard-title" style="font-size:22px;">您属于哪类人群？</h2>
                <p class="onboard-subtitle" style="margin-bottom:20px;">已为您预选常见选项，可多选</p>
                <div class="condition-grid">
                    <div class="condition-card selected">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">❤️</div>
                        <div class="condition-card-name">脑梗/心血管</div>
                    </div>
                    <div class="condition-card selected">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🫀</div>
                        <div class="condition-card-name">高血压</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🩸</div>
                        <div class="condition-card-name">糖尿病</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🦴</div>
                        <div class="condition-card-name">痛风</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部按钮 -->
        <div class="action-bar">
            <button class="action-btn action-btn-secondary">上一步</button>
            <button class="action-btn action-btn-primary">下一步</button>
        </div>
    </div>
</body>
</html>
