/* Brand CSS — AI Food Scanner v2 */
/* Inspired by glassmorphism + gradient hero + ring animation style */
:root {
  /* ── Green scale (full) ── */
  --green-50: #f0fdf4;
  --green-100: #dcfce7;
  --green-200: #bbf7d0;
  --green-300: #86efac;
  --green-400: #4ade80;
  --green-500: #22c55e;
  --green-600: #16a34a;
  --green-700: #15803d;
  --green-800: #166534;
  --green-900: #14532d;

  /* Semantic */
  --amber-50: #fffbeb;
  --amber-100: #fef3c7;
  --amber-500: #f59e0b;
  --amber-600: #d97706;
  --amber-700: #b45309;

  --sky-50: #f0f9ff;
  --sky-100: #e0f2fe;
  --sky-500: #0ea5e9;
  --sky-600: #0284c7;
  --sky-700: #0369a1;

  --red-50: #fef2f2;
  --red-500: #ef4444;

  /* Neutrals */
  --gray-25: #fcfcfd;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;

  /* Surface */
  --color-bg: #f8faf8;
  --color-bg-card: #ffffff;
  --color-text-primary: #111827;
  --color-text-secondary: #4b5563;
  --color-text-tertiary: #9ca3af;
  --color-text-inverse: #ffffff;
  --color-border: #e5e7eb;
  --color-divider: #f3f4f6;

  /* On-dark text (inside score hero) */
  --text-on-dark: #ffffff;
  --text-on-dark-60: rgba(255,255,255,0.6);
  --text-on-dark-55: rgba(255,255,255,0.55);
  --text-on-dark-45: rgba(255,255,255,0.45);
  --text-on-dark-70: rgba(255,255,255,0.7);
  --text-on-dark-15: rgba(255,255,255,0.15);
  --overlay-dark-16: rgba(255,255,255,0.16);
  --overlay-dark-20: rgba(255,255,255,0.2);
  --overlay-dark-10: rgba(255,255,255,0.1);
  --overlay-dark-08: rgba(255,255,255,0.08);
  --border-dark-12: rgba(255,255,255,0.12);
  --border-dark-04: rgba(0,0,0,0.04);
  --border-dark-03: rgba(0,0,0,0.03);
  --surface-glass: rgba(255,255,255,0.88);

  /* Typography */
  --font-family: 'DM Sans', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-family-num: 'DM Sans', 'DIN Alternate', 'Helvetica Neue', sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-score: 52px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.7;
  --tracking-tight: -0.02em;
  --tracking-wide: 0.02em;

  /* Shape — larger radius matching reference */
  --radius-full: 9999px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;

  --space-10: 40px;

  /* Depth — layered shadows */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-card: 0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);

}

  <script>
    /* ── 分数计数动画 ── */
    (function() {
      var scoreEl = document.getElementById('scoreNum');
      var ringEl = document.getElementById('scoreRing');
      var target = 100;
      var duration = 1200;
      var delay = 600;
      /* 圆环周长 = 2 * PI * 60 */
      var circumference = 2 * Math.PI * 60;

      setTimeout(function() {
        /* 启动圆环动画 */
        ringEl.style.strokeDashoffset = circumference * (1 - target / 100);

        /* 数字计数 */
        var startTime = performance.now();
        function step(now) {
          var elapsed = now - startTime;
          var progress = Math.min(elapsed / duration, 1);
          /* easeOutCubic */
          var ease = 1 - Math.pow(1 - progress, 3);
          scoreEl.textContent = Math.round(ease * target);
          if (progress < 1) {
            requestAnimationFrame(step);
          }
        }
        requestAnimationFrame(step);
      }, delay);
    })();

    /* ── 配料展开/收起 ── */
    function toggleIngredients() {
      var trigger = document.getElementById('expandTrigger');
      var body = document.getElementById('expandBody');
      var isOpen = body.classList.contains('open');
      if (isOpen) {
        body.classList.remove('open');
        trigger.classList.remove('active');
      } else {
        body.classList.add('open');
        trigger.classList.add('active');
      }
    }
  </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
      body {
        font-family: var(--font-family);
        background: var(--color-bg);
        color: var(--color-text-primary);
        line-height: var(--line-height-normal);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* ── 页面容器 ── */
      .page-wrap {
        max-width: 414px;
        margin: 0 auto;
        min-height: 100vh;
        position: relative;
        padding-bottom: 100px;
      }

      /* ── 顶部毛玻璃导航 ── */
      .glass-top-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--surface-glass);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        display: flex;
        align-items: center;
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--border-dark-04);
      }
      .glass-top-bar .bar-title {
        flex: 1;
        text-align: center;
        font-size: var(--font-size-lg);
        font-weight: var(--font-weight-semibold);
        color: var(--color-text-primary);
      }
      .glass-top-bar .bar-spacer { width: 32px; }

      /* ── 评分英雄卡片 ── */
      .score-hero {
        position: relative;
        margin: var(--space-4) var(--space-4) 0;
        padding: var(--space-8) var(--space-6) var(--space-6);
        border-radius: var(--radius-2xl);
        background: linear-gradient(145deg, var(--green-800) 0%, var(--green-700) 30%, var(--green-600) 70%, var(--green-500) 100%);
        box-shadow: var(--shadow-score);
        overflow: hidden;
        color: var(--text-on-dark);
      }
      .score-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 20% 80%, rgba(255,255,255,0.12) 0%, transparent 60%);
        pointer-events: none;
      }
      .score-hero::after {
        content: '';
        position: absolute;
        top: -30px;
        right: -30px;
        width: 120px;
        height: 120px;
        border: 2px solid var(--overlay-dark-16);
        border-radius: 50%;
        pointer-events: none;
      }

      /* ── 分数环 ── */
      .score-ring-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: var(--space-5);
      }
      .score-ring-svg { width: 140px; height: 140px; }
      .score-ring-bg { fill: none; stroke: var(--text-on-dark-15); stroke-width: 8; }
      .score-ring-fg {
        fill: none;
        stroke: url(#scoreGradient);
        stroke-width: 8;
        stroke-linecap: round;
        transform: rotate(-90deg);
        transform-origin: center;
        stroke-dasharray: 376.99;
        stroke-dashoffset: 376.99;
        transition: stroke-dashoffset 1.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .score-number {
        position: absolute;
        font-family: var(--font-family-num);
        font-size: var(--font-size-score);
        font-weight: var(--font-weight-bold);
        letter-spacing: -0.04em;
        line-height: 1;
        color: var(--text-on-dark);
      }
      .score-label {
        font-size: var(--font-size-sm);
        color: var(--text-on-dark-70);
        margin-top: var(--space-1);
      }

      /* ── 状态徽章 ── */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-4);
        background: var(--overlay-dark-16);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--overlay-dark-20);
        border-radius: var(--radius-full);
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-medium);
        color: var(--text-on-dark);
      }

      /* ── 内容卡片 ── */

        margin: var(--space-3) var(--space-4) 0;
        padding: var(--space-5);
        background: var(--color-bg-card);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-dark-03);

        font-weight: var(--font-weight-semibold);
        color: var(--color-text-primary);
        margin-bottom: var(--space-4);

        padding: var(--space-4);

        align-items: flex-start;
        gap: var(--space-3);
        padding: var(--space-4);
        background: var(--amber-50);
        border-radius: var(--radius-md);
        border: 1px solid var(--amber-100);
      }
      .info-icon {

        height: 36px;
        border-radius: 50%;
        background: var(--amber-100);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;

        font-size: var(--font-size-sm);
        color: var(--amber-700);
        font-weight: var(--font-weight-medium);
        line-height: var(--line-height-relaxed);

      .expand-trigger {

        align-items: center;
        justify-content: space-between;
        cursor: pointer;

        justify-content: space-between;
        padding: var(--space-3) 0;
        border-bottom: 1px solid var(--color-divider);
      }
      .ingredient-item:last-child { border-bottom: none; }
      .ingredient-name {
        font-size: var(--font-size-base);
        color: var(--color-text-primary);
        font-weight: var(--font-weight-medium);
      }
      .ingredient-tag {
        font-size: var(--font-size-xs);
        padding: 2px var(--space-2);
        border-radius: var(--radius-sm);
        font-weight: var(--font-weight-medium);
      }
      .tag-safe {
        background: var(--green-50);
        color: var(--green-700);
        border: 1px solid var(--green-200);
      }
      .tag-ferment {
        background: var(--sky-50);
        color: var(--sky-700);
        border: 1px solid var(--sky-100);
      }

      /* ── 语音控制 ── */
      .voice-section {
        margin: var(--space-3) var(--space-4) 0;
        display: flex;
        gap: var(--space-3);
      }
      .btn-primary {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        padding: var(--space-4) var(--space-5);
        border: none;
        border-radius: var(--radius-lg);
        background: linear-gradient(135deg, var(--green-600), var(--green-700));
        color: var(--color-text-inverse);
        font-family: var(--font-family);
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-semibold);
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(22,163,74,0.25);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .btn-primary:active { transform: scale(0.97); }
      .btn-outline {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        padding: var(--space-4) var(--space-5);
        border: 1.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        background: var(--color-bg-card);
        color: var(--color-text-secondary);
        font-family: var(--font-family);
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-medium);
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .btn-outline:active { background: var(--gray-50); }

      /* ── 底部毛玻璃栏 ── */
      .glass-bottom-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 414px;
        z-index: 100;
        background: var(--surface-glass);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        display: flex;
        gap: var(--space-3);
        padding: var(--space-3) var(--space-4);
        padding-bottom: max(var(--space-3), env(safe-area-inset-bottom));
        border-top: 1px solid var(--border-dark-04);
      }

      /* ── 动画 ── */
      @keyframes cardEnter {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .anim-enter-1 { animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0s both; }
      .anim-enter-2 { animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both; }
      .anim-enter-3 { animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both; }
      .anim-enter-4 { animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both; }
      .anim-enter-5 { animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both; }
      .anim-fade { animation: fadeUp 0.5s ease both; }
      .anim-fade-d1 { animation: fadeUp 0.5s ease 0.1s both; }
      .anim-fade-d2 { animation: fadeUp 0.5s ease 0.2s both; }
      .anim-fade-d3 { animation: fadeUp 0.5s ease 0.3s both; }

      /* ── 慢速重听按钮（英雄卡片内） ── */
      .hero-btn-outline {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-2) var(--space-4);
        border: 1px solid var(--overlay-dark-20);
        border-radius: var(--radius-full);
        background: var(--overlay-dark-08);
        color: var(--text-on-dark);
        font-family: var(--font-family);
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-medium);
        cursor: pointer;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        transition: background 0.15s ease;
      }
      .hero-btn-outline:active { background: var(--overlay-dark-16); }

      /* ── 辅助 ── */
      .text-on-dark { color: var(--text-on-dark); }
      .text-on-dark-60 { color: var(--text-on-dark-60); }
      .text-on-dark-70 { color: var(--text-on-dark-70); }
      .text-on-dark-45 { color: var(--text-on-dark-45); }
      .text-secondary { color: var(--color-text-secondary); }
      .text-tertiary { color: var(--color-text-tertiary); }
      .back-btn {
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center;
        border: none; background: transparent;
        cursor: pointer; border-radius: var(--radius-sm);
        color: var(--color-text-primary);
      }
      .back-btn:active { background: var(--gray-100); }
    </style>
</body>
</html>
