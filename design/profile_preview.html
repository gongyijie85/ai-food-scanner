<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康档案 - 页面优化预览</title>
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-primary-light: #E8F5E9;
            --color-primary-dark: #1B5E20;
            --color-secondary: #FF9800;
            --color-bg: #FAFAF5;
            --color-bg-card: #FFFFFF;
            --color-text-primary: #212121;
            --color-text-secondary: #616161;
            --color-text-tertiary: #9E9E9E;
            --color-text-inverse: #FFFFFF;
            --color-border: #E0E0E0;
            --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --radius-full: 9999px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family-cn);
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-shell {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: var(--color-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            padding-bottom: 100px;
        }

        /* 顶部导航 */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--color-bg-card);
            box-shadow: var(--shadow-card);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .top-nav-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-primary-light);
            color: var(--color-primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-nav-title { font-size: 18px; font-weight: 700; }
        .top-nav-spacer { width: 40px; }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 页面标题区 */
        .page-header {
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-card);
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-desc {
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        /* 卡片 */
        .card {
            background: var(--color-bg-card);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-card);
        }

        .card-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-top: -10px;
            margin-bottom: 14px;
        }

        /* 基本信息输入 */
        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
        }

        .form-input {
            height: 48px;
            padding: 0 14px;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-family: inherit;
            background: var(--color-bg);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }

        /* 疾病/过敏原网格 */
        .condition-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .condition-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 96px;
            padding: 14px;
            border-radius: var(--radius-md);
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
        }

        .condition-card.selected {
            background: var(--color-primary-light);
            border-color: var(--color-primary);
        }

        .condition-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-border);
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.15s ease;
        }

        .condition-card.selected .condition-card-icon {
            background: var(--color-primary);
            color: white;
        }

        .condition-card-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--color-text-primary);
        }

        .condition-card.selected .condition-card-name {
            color: var(--color-primary);
            font-weight: 700;
        }

        /* 选中时对勾 */
        .condition-card-check {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.15s ease;
        }

        .condition-card.selected .condition-card-check {
            opacity: 1;
            transform: scale(1);
        }

        /* 用药标签 */
        .drug-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .drug-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-full);
            background: var(--color-primary-light);
            color: var(--color-primary);
            font-size: 14px;
            font-weight: 500;
        }

        .drug-tag-remove {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(46, 125, 50, 0.15);
            color: var(--color-primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .drug-add-btn {
            padding: 8px 16px;
            border-radius: var(--radius-full);
            border: 2px dashed var(--color-border);
            background: var(--color-bg);
            color: var(--color-text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 保存按钮 */
        .save-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            background: rgba(250, 250, 245, 0.98);
            border-top: 1px solid var(--color-border);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            z-index: 40;
        }

        .save-btn {
            width: 100%;
            height: 52px;
            border-radius: var(--radius-full);
            border: none;
            background: linear-gradient(135deg, #43A047 0%, #2E7D32 100%);
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        /* 桌面端 */
        @media (min-width: 768px) {
            body { background: #E8E8E0; padding: 40px 20px; }
            .phone-shell {
                min-height: 900px;
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.15);
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="phone-shell">
        <header class="top-nav">
            <button class="top-nav-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <span class="top-nav-title">健康档案</span>
            <div class="top-nav-spacer"></div>
        </header>

        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    我的健康档案
                </div>
                <p class="page-desc">填写后，识别结果会根据您的健康情况给出个性化建议</p>
            </div>

            <!-- 基本信息 -->
            <section class="card">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    基本信息
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label class="form-label">称呼（可选）</label>
                        <input class="form-input" type="text" placeholder="如：张奶奶" value="张奶奶">
                    </div>
                    <div class="form-field">
                        <label class="form-label">年龄</label>
                        <input class="form-input" type="number" value="65">
                    </div>
                </div>
            </section>

            <!-- 健康状况 -->
            <section class="card">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    我的健康状况
                </div>
                <p class="card-subtitle">可多选，帮助我们提供更准确的建议</p>
                <div class="condition-grid">
                    <div class="condition-card selected">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">❤️</div>
                        <div class="condition-card-name">脑梗/心血管</div>
                    </div>
                    <div class="condition-card selected">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🩸</div>
                        <div class="condition-card-name">糖尿病</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🫀</div>
                        <div class="condition-card-name">高血压</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🦴</div>
                        <div class="condition-card-name">痛风</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🍼</div>
                        <div class="condition-card-name">乳糖不耐</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🌾</div>
                        <div class="condition-card-name">肾病</div>
                    </div>
                </div>
            </section>

            <!-- 过敏原 -->
            <section class="card">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    过敏原
                </div>
                <p class="card-subtitle">如有过敏请点击选择</p>
                <div class="condition-grid">
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🥜</div>
                        <div class="condition-card-name">花生</div>
                    </div>
                    <div class="condition-card selected">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🥛</div>
                        <div class="condition-card-name">牛奶</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🥚</div>
                        <div class="condition-card-name">鸡蛋</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🦐</div>
                        <div class="condition-card-name">甲壳类</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🌰</div>
                        <div class="condition-card-name">坚果</div>
                    </div>
                    <div class="condition-card">
                        <div class="condition-card-check">✓</div>
                        <div class="condition-card-icon">🌾</div>
                        <div class="condition-card-name">小麦</div>
                    </div>
                </div>
            </section>

            <!-- 当前用药 -->
            <section class="card">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="M8.5 8.5l7 7"/></svg>
                    当前用药
                </div>
                <p class="card-subtitle">选填，用于配料交互提醒</p>
                <div class="drug-tags">
                    <div class="drug-tag">
                        二甲双胍（降糖药）
                        <button class="drug-tag-remove">×</button>
                    </div>
                    <div class="drug-tag">
                        氨氯地平（降压药）
                        <button class="drug-tag-remove">×</button>
                    </div>
                    <button class="drug-add-btn">+ 添加用药</button>
                </div>
            </section>
        </main>

        <!-- 保存按钮 -->
        <div class="save-bar">
            <button class="save-btn">💾 保存档案</button>
        </div>
    </div>
</body>
</html>
