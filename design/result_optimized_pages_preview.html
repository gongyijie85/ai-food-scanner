<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>识别结果 - AI 食品扫描</title>
    <style id="theme-vars">
/* Brand CSS — AI Food Scanner */
:root {
  /* Color system */
  --color-primary: #2E7D32;
  --color-primary-light: #E8F5E9;
  --color-primary-dark: #1B5E20;
  --state-success: #43A047;
  --state-warning: #F57F17;
  --state-error: #E53935;
  --state-info: #1976D2;
  --color-bg: #FAFAF5;
  --color-bg-card: #FFFFFF;
  --color-text-primary: #212121;
  --color-text-secondary: #616161;
  --color-text-tertiary: #9E9E9E;
  --color-text-inverse: #FFFFFF;
  --color-border: #E0E0E0;
  --color-divider: #EEEEEE;

  /* Typography */
  --font-family-cn: "PingFang SC", "Source Han Sans CN", "Noto Sans SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-family-num: "Roboto", "DIN Alternate", "Helvetica Neue", "Arial", sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 13px;
  --font-size-base: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-hero: 56px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* Shape */
  --radius-full: 9999px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 28px;

  /* Depth */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.05);
  --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.08);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>

    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;

</head>
<body>
  <div class="page-wrapper">

    <!-- ===== 顶部导航 ===== -->
    <nav class="top-nav">
      <button class="nav-btn" aria-label="返回">
        <svg viewBox="0 0 24 24">
          <path d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <span class="nav-title">识别结果</span>
      <div class="nav-spacer"></div>
    </nav>

    <!-- ===== 分数主卡片（优化布局） ===== -->
    <section class="score-card">
      <!-- 顶部：产品名（左）+ 分数（右）水平排列 -->
      <div class="score-card-top">
        <div class="product-info">
          <h1 class="product-name">蒙牛纯甄原味酸奶 200g</h1>
          <p class="product-meta">配料表识别于 2026-07-14</p>
        </div>
        <div class="score-circle">
          <span class="score-number">100</span>
          <span class="score-label">安全分</span>
        </div>
      </div>

      <!-- 状态标签 -->
      <div class="status-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span>暂未发现已知高风险提示</span>
      </div>

      <!-- 副标题 -->
      <p class="score-card-subtitle">按当前档案暂未发现高风险配料</p>

      <!-- 底部：免责声明 + 慢速重听 -->
      <div class="score-card-footer">
        <p class="disclaimer">结果仅供参考，不构成医疗或饮食建议。如有过敏史或特殊疾病，请咨询专业医师。</p>
        <button class="btn-replay" aria-label="慢速重听">
          <svg viewBox="0 0 24 24">
            <path d="M1 4v6h6"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          <span>慢速重听</span>
        </button>
      </div>
    </section>

    <!-- ===== 添加剂清单卡片 ===== -->
    <section class="content-card">
      <h2 class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 14l2 2 4-4"/>
        </svg>
        添加剂清单
      </h2>
      <div class="card-body" style="margin-top:var(--space-md);">
        <div class="card-success-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--state-success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="16 9 10.5 15 8 12.5"/>
          </svg>
          <span>未识别到需要关注的食品添加剂</span>
        </div>
      </div>
    </section>

    <!-- ===== 一般饮食建议卡片 ===== -->
    <section class="content-card">
      <h2 class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--state-warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4"/>
          <path d="M12 8h.01"/>
        </svg>
        一般饮食建议
      </h2>
      <div class="card-body">
        <div class="advice-box">
          <span class="advice-icon">&#x2139;&#xFE0F;</span>
          <p class="advice-text">普通人群可适量食用，建议保持均衡饮食。</p>
        </div>
      </div>
    </section>

    <!-- ===== 查看全部配料（可展开） ===== -->
    <section class="expand-section">
      <div class="expand-header" id="expandHeader" onclick="toggleExpand()">
        <span class="expand-header-title">查看全部配料</span>
        <svg class="expand-chevron" id="expandChevron" viewBox="0 0 24 24">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="expand-body" id="expandBody">
        <ul class="ingredient-list">
          <li>生牛乳</li>
          <li>
            白砂糖
            <span class="ingredient-tag">适量</span>
          </li>
          <li>
            保加利亚乳杆菌
            <span class="ingredient-tag">发酵剂</span>
          </li>
          <li>
            嗜热链球菌
            <span class="ingredient-tag">发酵剂</span>
          </li>
          <li>
            食品添加剂：增稠剂（果胶）
            <span class="ingredient-tag">安全</span>
          </li>
        </ul>
      </div>
    </section>

    <!-- ===== 语音播报控制 ===== -->
    <div class="voice-controls">
      <button class="voice-btn btn-primary" aria-label="一键播报全部结果">
        <svg class="play-icon" viewBox="0 0 24 24" stroke-width="0">
          <path d="M8 5v14l11-7z"/>
        </svg>
        一键播报全部结果
      </button>
      <button class="voice-btn btn-secondary" aria-label="停止播报">
        <svg class="stop-icon" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-secondary)">
          <rect x="6" y="6" width="12" height="12" rx="1"/>
        </svg>
        停止
      </button>
    </div>

    <!-- ===== 底部操作导航 ===== -->
    <div class="bottom-nav">
      <button class="nav-action outlined" aria-label="再扫一个">
        <svg viewBox="0 0 24 24">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        再扫一个
      </button>
      <button class="nav-action ghost" aria-label="返回首页">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        返回首页
      </button>
    </div>

  </div>

  <script>
    // 展开/收起配料列表
    function toggleExpand() {
      var header = document.getElementById('expandHeader');
      var body = document.getElementById('expandBody');
      var isOpen = body.classList.contains('open');
      if (isOpen) {
        body.classList.remove('open');
        header.classList.remove('open');
      } else {
        body.classList.add('open');
        header.classList.add('open');
      }
    }
  </script>

    <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family-cn);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-bg);
      line-height: var(--line-height-normal);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .page-wrapper {
      max-width: 414px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--color-bg);
      padding-bottom: 40px;
    }

    /* ========== Top Nav ========== */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg);
      background: var(--color-bg-card);
      box-shadow: var(--shadow-card);
    }

    .top-nav .nav-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      transition: background 0.15s;
    }

    .top-nav .nav-btn:active {
      background: var(--color-divider);
    }

    .top-nav .nav-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: var(--color-text-primary);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .top-nav .nav-title {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
    }

    .top-nav .nav-spacer {
      width: 36px;
    }

    /* ========== Score Hero Card ========== */
    .score-card {
      margin: var(--space-lg);
      padding: var(--space-xl) var(--space-lg);
      background: var(--color-primary-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
    }

    /* 顶部：产品名 + 分数 水平排列 */
    .score-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-md);
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      line-height: var(--line-height-tight);
      /* 最多2行截断 */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-meta {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      margin-top: var(--space-xs);
    }

    /* 分数圆形区域 */
    .score-circle {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      background: var(--color-primary-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-number {
      font-family: var(--font-family-num);
      font-size: 28px;
      font-weight: var(--font-weight-bold);
      color: var(--color-primary-dark);
      line-height: 1;
    }

    .score-label {
      font-size: 9px;
      color: var(--color-primary-dark);
      opacity: 0.7;
      margin-top: 1px;
    }

    /* 状态标签 - 绿色药丸 */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: var(--space-md);
      padding: 5px 10px 5px 8px;
      background: var(--color-bg-card);
      border-left: 3px solid var(--state-success);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: var(--font-size-xs);
      color: var(--state-success);
      font-weight: var(--font-weight-medium);
    }

    .status-pill svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* 副标题 */
    .score-card-subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      margin-top: var(--space-sm);
      line-height: var(--line-height-relaxed);
    }

    /* 底部行：免责声明 + 慢速重听按钮 */
    .score-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--space-md);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--color-divider);
    }

    .disclaimer {
      flex: 1;
      font-size: 11px;
      color: var(--color-text-tertiary);
      line-height: var(--line-height-relaxed);
    }

    .btn-replay {
      flex-shrink: 0;
      margin-left: var(--space-sm);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--color-primary);
      font-size: var(--font-size-xs);
      font-family: var(--font-family-cn);
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-replay:active {
      background: var(--color-primary-light);
    }

    .btn-replay svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: var(--color-primary);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ========== Content Cards ========== */
    .content-card {
      margin: var(--space-lg);
      padding: var(--space-lg);
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
    }

    .content-card + .content-card {
      margin-top: 0;
    }

    .card-title {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .card-title svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .card-body {
      margin-top: var(--space-sm);
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
    }

    /* 添加剂卡片 - 成功状态 */
    .card-success-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md);
      background: var(--color-primary-light);
      border-radius: var(--radius-md);
    }

    .card-success-row svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .card-success-row span {
      font-size: var(--font-size-sm);
      color: var(--state-success);
      font-weight: var(--font-weight-medium);
    }

    /* 建议卡片 */
    .advice-box {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      padding: var(--space-md);
      background: color-mix(in srgb, var(--state-warning) 8%, var(--color-bg-card));
      border-radius: var(--radius-md);
      margin-top: var(--space-sm);
    }

    .advice-icon {
      font-size: 18px;
      line-height: 1.4;
      flex-shrink: 0;
    }

    .advice-text {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
    }

    /* ========== Expandable Section ========== */
    .expand-section {
      margin: var(--space-lg);
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .expand-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg);
      cursor: pointer;
      transition: background 0.15s;
    }

    .expand-header:active {
      background: var(--color-divider);
    }

    .expand-header-title {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-primary);
    }

    .expand-chevron {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--color-text-tertiary);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s;
    }

    .expand-header.open .expand-chevron {
      transform: rotate(180deg);
    }

    .expand-body {
      display: none;
      padding: 0 var(--space-lg) var(--space-lg);
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-relaxed);
    }

    .expand-body.open {
      display: block;
    }

    .ingredient-list {
      list-style: none;
    }

    .ingredient-list li {
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--color-divider);
    }

    .ingredient-list li:last-child {
      border-bottom: none;
    }

    .ingredient-tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--color-divider);
      border-radius: var(--radius-sm);
      font-size: var(--font-size-xs);
      margin-left: var(--space-xs);
      color: var(--color-text-tertiary);
    }

    /* ========== Voice Controls ========== */
    .voice-controls {
      margin: var(--space-xl) var(--space-lg) var(--space-lg);
    }

    .voice-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      font-family: var(--font-family-cn);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      transition: opacity 0.15s;
      border: none;
    }

    .voice-btn:active {
      opacity: 0.85;
    }

    .voice-btn svg {
      width: 18px;
      height: 18px;
    }

    .voice-btn svg.play-icon {
      fill: var(--color-text-inverse);
      stroke: var(--color-text-inverse);
      stroke-width: 0;
    }

    .voice-btn svg.stop-icon {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-primary {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      box-shadow: var(--shadow-card);
    }

    .btn-secondary {
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
      margin-top: var(--space-sm);
    }

    /* ========== Bottom Nav ========== */
    .bottom-nav {
      display: flex;
      gap: var(--space-sm);
      margin: var(--space-xl) var(--space-lg);
    }

    .bottom-nav .nav-action {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-medium);
      font-family: var(--font-family-cn);
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
    }

    .bottom-nav .nav-action:active {
      background: var(--color-divider);
    }

    .bottom-nav .nav-action svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-action.outlined {
      background: var(--color-bg-card);
      color: var(--color-primary);
      border: 1px solid var(--color-primary);
    }

    .nav-action.outlined svg {
      stroke: var(--color-primary);
    }

    .nav-action.ghost {
      background: transparent;
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }

    .nav-action.ghost svg {
      stroke: var(--color-text-secondary);
